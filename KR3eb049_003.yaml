body:
  text: 卷下色診面色總義面部內應臟腑外應肢節並男女左右順逆篇明堂者鼻也闕者眉間也庭者顏也千金翼方云顏當兩目下貌當兩目上眉下與此異說蕃者頰側也蔽者耳門也其間欲方大去之十步以外皆見於外壽中百歲矣故明堂骨高以起平以直五臟次於中央六腑夾其兩側首面上於闕庭王宮在於下極故庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也夾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也夾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也五色所見各有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右所起所向是謂大道男女異位故曰陰陽五色熱病肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病熱病從部所起者至期而已謂如從心部先赤起者至心主氣之期其病即已餘臟類推太陽之脈色榮顴骨熱病也榮未交交則其色必由本部入於七竅如後所謂入門戶井灶所謂傷部而交是也曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱氣內連腎少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日兩爭見皆以部位言謂此部與彼部色並見與榮交同義頰下逆顴為大瘕逆連也大瘕泄即痢疾也下牙車為腹滿顴後為脅痛頰上者膈上也刺熱論此篇所敘部位與上節五色篇不同須參觀而得之色見上下左右各在其要上為逆下為從詳下篇女子右為逆左為從男子左為逆右為從易重陰死重陽死其色見淺者湯液主治十日已其見深者必齊主治峻劑也二十一日已其見大深者醪酒主治百日已色夭面脫不治百日盡已脈短氣絕死病溫虛甚死玉版按錢仲陽診李寺丞子三歲病搐目右視大叫哭錢曰此逆也男為陽而本發左女為陰而本發右若男目左視發搐時無聲右視有聲女發時右視無聲左視有聲所以然者左肝右肺肝木肺金男目右視肺勝肝也金來刑木二臟相戰故有聲也此文雖非論面色而男女左右順逆之義與經相反者蓋右視即病在左左視即病在右耳陳遠公謂男女左右之說不足信者其意以為臟腑肢節配合之部位不當有左右之殊也第經旨逆從只指氣色先起於左與先起於右若臟腑肢節部位經文亦何嘗分左右耶附倉公診色分界法齊丞相舍人奴病傷脾氣法當至春膈塞不通不能飲食至夏泄血死所以知然者脾氣周乘五臟傷部而交故傷脾之色望之殺然黃察之如死青之滋交即前榮未交之交宋建病腎痹得之好持重當要脊痛不得溺所以知然者見其色太陽色干腎部上及界要以下者枯四分所故以往四五日知其發也要腰字齊中郎破石病肺傷得之墮馬當溲血死所以知然者切其脈得肺陰氣其來散數道至而不一也色又乘之數道謂其脈來指下如有數條細縷散而不能聚者此痰飲常象也瘀血亦有之皆由氣有所隔不能周到故也若死脈是氣散也謂之解索面部臟腑肢節分位圖說篇謹案面部當分九行正中一行左右各四行也正中為天庭為闕上為闕中為下極為方上為面王為中央此中央為人中也為承漿為下頦其側當內眥以下為目內眥為面王以上為面王以下次側當目睛以下為巨分一名法令為頤口角次側當顴以下為顴一名頄音求為中央此中央為頰中央也次側當顴後耳前為顑一作頷以其動與頷應也為顴後一名䪼音拙即顴後橫骨為循牙車以下次側在面部之外為蔽耳門也為蕃頰側也夾繩而上者繩為面部兩側之轉角處也下當顴上當額角如引繩者夾而上即夾額角也方上謂正當面王之上即鼻柱與准相接稍見低扼之處能候胃氣盛虛胃有瘕聚即生黯皯胃氣虛怯即見低陷方之為義與本腧篇大陵掌後兩骨之間方下者也正同舊為兩迎香上者未協綜觀其位五臟次於中央而腎居膀胱下五色篇言中央有三而義各不同六腑夾其兩側而胃居脾上肢節又居六腑之外也刺熱論謂頰下逆顴為大瘕大瘕泄即痢疾也有謂五更腎泄者未是是大腸病也是中央診膝又診大腸也故大便久秘即其處發熱顴後為脅痛是顴後診臂又診脅也下牙車為腹滿是牙車以下診股又診腹也且股與股里膝臏與膝似俱不當兩出疑巨分股里當作腹裡也頰上者膈上也是顴後橫骨之上也又案面部之內應臟腑也有以筋所結有以脈所過有以氣化所通有以神明所發如上文五色篇及刺熱論所敘蓋氣化之事也若內眥膀胱外眥小腸上唇人中大腸下唇環口胃耳前後耳中三焦膽則脈絡之事也目上綱太陽下綱陽明鼻足太陽耳中手太陽頭右角足少陽左角手陽明則筋絡之事也舌心耳腎鼻肺唇脾目肝眉膽則神明之事也病在筋者視筋絡之部病在脈者視脈絡之部病在氣化者視氣化之部病在神明者視神明之部知此則分部之法雖各不同而皆各適其用矣聖人之言豈故為多歧以惑人哉事各有當不如此則事理不備也茲詳註面部經絡如下以便省覽額顱頭項膀胱脈上額交巔上下項胃脈過客主人循髮際至額顱肝脈上出額與督脈會於巔膽脈上抵頭角三焦脈過客主人前三焦正脈別於巔胃正脈上額䪼胃別脈上絡頭項以上經脈所絡心腎肺脾胃五絡皆會於耳中上絡左角以上絡脈所絡督脈上額交巔入絡腦還出別下項營氣上巔下項合足太陽其支者上額循巔下項中循脊入骶是督脈也以上奇經所絡膀胱筋上頭腎筋結於枕骨膽筋上額角交巔上左絡於右三焦筋上乘頷結於角大腸筋上左角絡頭以上經筋所絡面顏胃陽明脈榮於面心其華在面心正脈出於面膽正脈散於面以上經脈所絡任脈循面以上奇經所絡膀胱筋上顏以上經筋所絡鼻柱鼻準鼻孔胃脈起於鼻之交頞中旁納太陽之脈下循鼻外大腸脈夾鼻孔小腸脈抵鼻以上經脈所絡膀胱筋結於鼻胃筋結於鼻以上經筋所絡人中大腸脈交人中左之右右之左脾氣絕人中滿以上經脈所絡按人中亦主膀胱子處督脈唇口大腸脈夾口胃脈夾口環唇胃正脈出於口肝脈環唇內故肝氣絕唇青太陰結於太倉故脾氣絕唇反以上經脈所絡任脈環唇以上奇經所絡三焦絡有邪口乾以上絡脈所絡胃筋夾口寒則引頰移口熱則緩縱不收胃小腸筋急則口目為噼以上經筋所絡承漿胃脈交承漿以上經脈所絡上齒下齒胃脈入上齒中大腸脈入下齒中大腸別脈入頄遍下齒膀胱別脈入頄遍上齒腎氣絕齒長而垢或齒光無垢以上經脈所絡舌中舌本舌下脾脈連舌本散舌下脾正脈貫舌中腎脈夾舌本腎正脈系舌本膀胱脈夾舌本心別脈系舌本少陰結於廉泉厥陰結於玉英脾氣絕舌萎以上經脈所絡癲狂篇舌下少陰膀胱筋支者入結舌本三焦筋系舌本三焦絡有邪舌卷肝氣絕舌卷卵縮以上經筋所絡咽喉胃脈循喉嚨胃別脈合諸經之氣下絡喉嗌胃正脈上循咽脾脈夾咽脾正脈結咽大腸正脈循喉嚨肺正脈循喉嚨小腸脈循咽心正脈走喉嚨包絡正脈循喉嚨膽正脈夾咽肝脈循喉嚨之後上入頏顙膀胱脈循咽喉腎脈循喉嚨營氣注肺上循喉嚨入頏顙之後究於畜門以上經脈所絡三焦絡有邪喉痹腎絡有邪咽痛不可納食以上絡脈所絡任脈至咽喉入喉以上奇經所絡目內眥銳眥上胞下胞胃脈上至目內眥膀胱脈起目內眥太陽結於命門命門者目也小腸脈過目銳眥至目內眥三焦脈至目銳眥膽脈起目銳眥至銳眥後其支者別銳眥心正脈合目內眥營氣注目內眥以上經脈所絡任脈入目系兩目之下中央督脈別絡起目內眥陰蹺之脈合太陽陽蹺而上行至目內眥故目內眥痛取之陰蹺以上奇經所絡膀胱筋為目上綱胃筋為目下綱膽筋結於目眥為外維小腸筋屬目外眥三焦筋屬目外眥胃小腸筋急口目為噼眥急不能卒視以上經筋所絡目下裹大其膽乃橫水在腹者目下必腫是脾氣通於下胞也上為外眥下為內毗目系膀胱脈正屬目本名曰眼系胃正脈系目系心別脈屬目系膽正脈系目系肝脈連目系故肝氣絕目暈衛氣平旦出於目目者宗脈所聚也以上經脈所絡脫陰者目盲氣脫者目不明顴䪼胃正脈上額䪼膀胱脈入頄遍上齒大腸脈入頄遍下齒小腸脈上䪼斜絡於顴三焦脈出䪼膽脈抵䪼下按䪼音拙顴後橫骨也頄音求即顴也作鳩誤以上經脈所絡胃筋合於頄膀胱筋結於頄大腸筋結於頄膽筋結於頄以上經筋所絡蹺脈入頄營氣出䪼以上奇經所絡頰頤大腸脈貫頰小腸脈上頰其支者別頰三焦脈下頰又交頰肝脈支者從目系下頰裡以上經脈所絡任脈上頤以上奇經所絡胃筋支者從頰結於耳前大腸筋上頰其支者下右頷以上經筋所絡頷曲頰牙車胃脈循頤後下廉下大迎循頰車膽脈下頰車大腸別脈上曲頰膽正脈出頤頷中以上經脈所絡大腸筋上頰其支者下右頷小腸筋下結於頷膽筋下走頷三焦筋支者當曲頰入系舌本其支者上牙車以上經筋所絡耳前後耳上下角耳中胃脈上耳前陽明結於顙大顙大者鉗耳也大腸別脈其支者入耳中合於宗脈耳者宗脈之所聚也小腸脈入耳中膀胱脈支者從巔至耳上角三焦脈系耳後上出耳上角入耳中出走耳前膽脈下耳後其支者從耳後入耳中出走耳前少陽結於窗籠窗籠者耳中也包絡正脈出耳後合三焦脈於完骨之下胃中空則宗脈虛故耳鳴液脫者骨屬曲伸不利脛酸耳數鳴精脫者耳聾以上經脈所絡心肝脾肺胃五絡皆會於耳中上絡左角以上絡脈所絡胃筋結於耳前三焦筋循耳前膽筋循耳後膀胱筋結於完骨小腸筋結於耳後完骨其支者入耳中直者出耳上以上經筋所絡上皆筋脈所絡之事也至於氣化神明之二義猶有可得而言者如額心鼻脾頤腎左頰肝右頰肺此高下左右以應五臟氣化之正位也又面色皆屬於心兩目四維皆屬於肝兩頰皆屬於肺唇四白皆屬於脾兩顴兩耳輪皆屬於腎頰車皆屬大腸舌下兩竅皆屬膽又屬腎此旁見側出以應臟腑氣化之旁溢也目分五臟者目雖主肝而出於腦腦受五臟之精也舌分五臟者舌雖主心而本於胃胃為臟腑之海也此皆氣化之所通也神明者性情之有知覺者也如耳能知音也目能知色也鼻能知臭也口能知味也舌能出音也此皆有五臟知覺以主之而非外竅所能為也故曰神明所發也病在筋失其形病在脈失其形或失其色病在氣化失其色病在神明失其知覺功用也能通此者即觀於面而知筋絡臟腑受病之淺深所謂洞見五臟症痞也可稱神良矣察色真訣篇出靈樞五色篇五色之見也各出其色部部骨陷者必不免於病矣其色部承襲者雖病甚不死也承襲者色與部相生也如水部見木色之類上部骨起陷千金方曰凡人分部骨陷起者必有病生膽少陽為肝之部小腸太陽為心之部胃陽明為脾之部大腸陽明為肺之部俠膀胱並太陽為腎之部若當其處陷者必死臟氣通於內外部亦隨而應之沉濁為內浮清為外若色從外走內者病從外生部處起若色從內出外者病從內生部處陷內病前治陰後治陽外病前治陽後治陰也按所稱五陽之部不知在面部何處與前圖說似有合有不合若依前圖說分之膽少陽肝部即鼻莖也小腸太陽心部即山根連目兩眥以下也胃陽明脾部即鼻準也膀胱太陽腎部即環口也大腸陽明肺部似指闕中非人中也如此則理有可通而事有可據矣五色各有臟部有外部有內部也色從外部走內部者其病從外走內色從內部走外部者其病從內走外病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚上分部內外凡色青黑赤白黃皆端滿有別鄉別鄉即內部外部之謂也其色上銳首空上聲上向下銳下向在左右如法左為左右為右其色有邪聚散而不端面色所指者也其色上行者病益甚其色下行如雲徹散者病方已此所謂上為逆下為從也端滿者謂人之生也本有五色之分其本來正色滿面者不為病也有邪則獨見其邪色或聚或散而不能端滿矣則有色所起之部與所指之部矣所謂別鄉也華佗謂面目俱等者不病不等則病矣謂其色獨見異於他部也故察色以其起大如拇指者為準上分部上下左右五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知痛處積神於心以知往今故相去聲氣不微不知是非屬意勿去乃知新故色明不粗沉夭為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也上浮沉澤夭摶散新故腎乘心心先病腎為應色皆如是謂心部先見腎色次腎部自見其色也餘臟同此男子色指黑色承腎來在於面王為首腹痛首腹大腹下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子色在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔暴食而即出不潔所謂迴風入咽旋出也凡色青黑赤白黃此特提五色者以上文是專指黑色也皆端滿有別鄉別鄉赤者其色赤作亦非大如榆莢在面王為不月原作不日注者謂不日即愈或曰不日即死皆非也此承女子來但非腎之黑色故特筆敘之讀者遂迷不識其實蒙上文矣風者百病之始也厥逆者寒濕之起也常候闕中薄澤為風沖濁為痹在地為厥此其常也各以其色言其病青黑為痛黃赤為熱白為寒是謂五官其色粗以明沉夭者為甚審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿即痰也赤甚者為血痛甚為攣寒甚為皮不仁上二節形應及主病大義按凡診面色以遠望而乍視之為能得其真華佗謂人面之色但改其常者即為病矣其改常也往往終日相對之人不覺而久別乍見者心竊驚異之矣又相法必須天明初起未盥未食之時此即診脈必以平旦之義在無病之人則然若病臥於床者其色脈終日如常固時時可診也第須問其曾食與否而已食入胃氣乍旺陽明之脈氣乍充光澤必盛也然久病即此亦可占胃氣之生死矣又按端滿別鄉上向下向走內走外與上篇所謂榮未交及厥陰少陰脈爭見等語乃察色之本不可不考也端滿即本來正色之滿面者華佗所謂面目俱等者不病也若邪色至於面目俱等豈得謂之無病耶別鄉即邪色所在之部異於他部者故曰別鄉赤者是其色赤大如榆莢也以赤為例他可知矣上下內外察其所起與其所向以占病之淺深吉凶也榮即色榮顴骨之榮謂淺露於膚也指初起之部言交者謂色滿於本部而又溢於他部如色起於顴溢於頰而復交於顴之類如此則色必環繞於目於鼻於口於耳矣故謂即入門戶井灶之事也爭見者彼部復有色起與此部相應也故部位不可不詳而色之所起所向不可不察也若不識此即不能以色決病矣至於所謂色者隱隱於皮膚之下若隱若見者也其浮於皮上者非也或塵垢所著或風日所暴或燥膚之將起白屑而未退者過在浮肌而無與於內臟也又有為穢惡之氣所沖者亦由陽氣不足也又凡色氣退散必先退出於皮上而散也故曰積神於心以知往今屬意勿去乃知新故恐其誤以將散為方起也五色吉凶通義篇夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼一作炭色五色精微象見矣其壽不久也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨故色見青如草滋者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹鉗生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也裹字最妙凡真色皆根於皮里其深含於皮里者正色也由皮里而暴露於皮外者病色死色也其薄散而僅浮於皮上者浮游之氣不根臟腑無關吉凶者也直謂之垢而已上素問夫五色有光明亮是也五色有體潤澤是也光者無形為陽主氣體者有象為陰主血氣血俱亡其色沉晦經所謂草滋枳實炲衃血枯骨五者是也氣血尚存其色光明潤澤經所謂翠羽雞冠蟹腹豕膏鳥羽五者是也然此五色雖為可生終屬一臟獨亢病也非平也平人五臟既和其一臟之色必待其王而始榮於外其榮於外也稟胃氣而出於皮毛之間胃氣色黃皮毛色白故云如縞裹如縞裹者朦朧光澤雖有形影猶未燦然內因氣血無乖陰陽不爭五臟無偏勝故也苟或不然五臟衰敗其見色也昔之朦朧者一變而為獨亢昔之光明者一變而為沉濁昔之潤澤者一變而為枯槁甚至沉濁枯槁合而為夭是光體俱無陰陽氣血俱絕矣不死又何待乎按此篇之義與前篇微有不同前指分部所起之邪色此指滿面自有之本色也邪色起於別鄉大如榆莢無論青黃赤白黑皆有所主之病有凶無吉者也本色端滿於面無有分部而專以色之夭澤辨吉凶者也一重在部上一重在色上色診面色應病類內經面部五色應病總述篇是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣青黑為痛黃赤為熱白為寒薄澤為風沖濁為痹沉濁為內浮澤為外大氣入於臟腑者不病而卒死何以知之曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出於庭大如拇指必不病而卒死也上論五色所主之病經曰大氣入臟腹痛下淫謂周身元氣皆內陷也故可以知死不可以致生何以知皮肉氣血筋骨之病也曰色起兩眉薄澤者病在皮膚唇色青黃赤白黑者病在肌肉營氣霈然者病在血脈目色青黃赤白黑者病在筋耳焦枯如受塵垢者病在骨鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑五臟各有次舍故五色之見於明堂以候五臟之氣左右高下各如其度也五痿者生於大熱也肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁上論五臟病色色以應日脈以應月色之與脈當參相應見其色而不得其脈反得相勝之脈者即死得相生之脈者病即自已假令色青其脈當弦而急色赤其脈當浮大而散色黃其脈當中緩而大色白其脈當浮澀而短色黑其脈當沉濡而滑此所謂五色之與脈參相應者也其不應者病矣假令色青其脈浮澀而短若大而緩為相勝浮大而散若小而滑為相生也有故病五臟發動因傷脈色各何以知其久暴至之病乎曰徵其脈小色不奪者新病也徵其脈不奪其色奪者久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也肝與腎並至其色蒼赤當病毀傷不見血已見血濕若中水也脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘即藟字發死按此浮濡而芤陽虛陰散所謂脾氣去胃外歸陽明也尺脈數甚筋急而見此謂疹筋腹急白色黑色見則病甚上論色脈相應按此脈數字似當作急字解謂緊斂急引而不舒和也見謂挺鼓於皮上也此寒氣深痼於筋中也故曰疹筋白黑色見是寒涼清肅之氣內連肝臟剋制生陽之氣化不得宣發也溺黃赤安臥者黃疸已食如飢者胃疸目黃者黃疸身痛而色微黃齒垢黃爪甲上黃黃疸也巢氏云身面發黃舌下大脈起青黑色舌強不能言者名曰噤黃心脾二臟瘀熱所為也卒然發黃心滿氣喘命在頃刻者名曰急黃有得病即身面發黃者有初不知是黃死後乃身面黃者其候得病即發熱心戰者是也癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止錢仲陽云目直視而腮赤肝心俱熱明日午間預防驚搐即此節義上雜論疸癲五臟風證並諸風肥瘦寒熱形色篇內經中藏經巢氏肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絕善怒嚇甲乙無嚇字赤色病甚則言不可快仲景曰風溫為病難以言又曰言遲者風也診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之伏多汗惡風面龐然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑腎風者面胕龐然壅害於言又面腫曰風肌恐顴字頤字或耳字之訛俟考胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大頸為陽明經脈所盛首風之狀新沐中風也然頭風不盡因新沐經特舉其大意耳後仿此頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀飲酒中風或多汗不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀林億云當作內風竊疑內風當是與泄風形證相近抑或內風即泄風故不別出多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒上漬句與末句疑有誤倒風者百病之長也善行而數變腠理開則灑然寒閉則熱而悶其寒也衰食飲其熱也消肌肉使人怢慄而不能食故名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮氣熱胕其氣不清故其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去脈風成為癘名曰癘風或名曰寒熱一名大風詳長刺節論又脈經曰脈從尺邪入陽明者大風也寒熱是其脈必洪長而外鼓也風中五臟六腑之俞各入其門戶則為偏風上素問心風之狀汗自出而好偃仰臥不可轉側言語狂妄若唇正赤者生宜於心俞灸之若唇面或青或黃或白或黑其色不定眼瞤動不休者心絕也五六日死肝風之狀青色圍目連額上但坐不得倨僂者可治宜於肝俞灸之若喘而目直視唇面俱青者死脾風之狀一身通黃腹大而滿不嗜食四肢不收持巢論有吐咸汁若手足未青面黃者可治不然巢論云手足青即死宜於脾俞灸之腎風之狀但倨坐而腰腳重痛也視其腰下未生黃點者巢論云如餅粢大可治不然巢論云若齒黃赤鬢髮直頭面土色者不可治即死宜於腎俞灸之肺風之狀胸中氣滿冒昧汗出鼻不聞香臭喘而不得臥者可治巢論云視目下鼻上下兩邊下行至口色白可治若失血及妄語者巢論云若色黃為肺已傷化為血七八日死宜於肺俞灸之上中藏經凡中風鼻下赤黑相兼吐沫而身直者七日死又心脾俱中風則舌強不能言肝腎俱中風則手足不遂上巢氏按小兒臍風與急慢驚風診法似當依此例察其面目以決其生死按百病皆有色診而前篇之末獨系疸癲此篇更專述風證者以風為百病之長而疸與癲為急病也凡急病五色之吉凶生死皆可取例於此若必欲備載百病色診則內經及百家所述繁矣不勝錄也千金面部五色入門戶井灶及五臟卒死吉凶篇出千金方翼方夫為醫者雖善於脈候而不知察於色氣終為未盡要妙也故善為醫者必須明於五色乃可以決死生定狐疑凡病人面色入門戶為凶不入為吉白色見沖眉上者肺有病入闕庭者夏死黃色見鼻上者脾有病入口者春夏死青色見人中者肝有病入目者秋死黑色見顴上者腎有病入耳者六月死赤色見頤者心有病入口者冬死所謂門戶闕庭肺門戶目肝門戶耳腎門戶口心脾門戶若有色氣入者皆死入者蔓延連合之義也素問謂之交凡病人有赤白青黑四氣不問大小在年上者病甚也惟黃色得愈年上在鼻上兩目間如下如而古通黑氣細如繩發四墓及兩顴上者死四墓在兩眉坐直上至髮際左為父墓右為母墓從口吻下極頤為下墓於此四墓上觀四時氣春見青氣節盡死夏見赤氣節盡死長夏秋見白氣節盡死冬見黑氣節盡死春見黃氣暴死見白氣至秋死或立夏死夏見白氣暴死見黑氣至冬死或夏至死秋見青氣暴死見赤氣節盡死或至夏死或冬至死冬見赤氣暴死見黃氣至長夏死或春分死見本氣及來克之氣皆節盡死或至其節死或至其勝死見所克之氣皆暴死何者一為自病為不勝一為所勝所謂反侮本氣敗也凡病人黃色入鼻從口入井灶百日死井在鼻孔上曲中是灶在口吻兩旁上一寸是年上有黑色橫度者不出百日死天中從髮際兩墓皆發黑色者三年死若顴上發黑色應之者二百日死矣天中當鼻直上至髮際是也目下有黑色橫度年上者不出三十日死黑色入口應天中者不出一年死脈經云病人黑色出天中下至年上顴上者死天中發黑色年上命門上並黃色者半好半惡也以天中為主五年內死天中發黑色法三年內死所以然者有二處得生故五年死相法以耳前為命門兩眉之間為命宮天中發黑色兩顴上發赤色應之者不出六十日兵死若年上發赤色應之者不出三十日死若命門上發赤色應之者不出百日市死婦人產死兵死同青色如針在目下春死或甲乙日死相法婦人目下青黯者克丈夫黃色入目匝四邊戊己日死赤色從眉衝下入目五日死或丙丁日死赤色入口三日死遠期丙丁日死黑色在左右眉上一日死或壬癸日死若白色亦死或庚辛日或二三日死黑色從天中及年上入目三日死或壬癸日或百日半年死黑色准上行或入目壬癸日死遠期二十日死若入耳鼻三日死准鼻端也行謂在壽上年上無定黑色橫兩顴入鼻一年死黑色如拇指在眉上不出一年暴死一云三年前云黑色在左右眉上一日死當是指病甚者此指無病者與黑色從眉繞目死赤色在口兩旁死黑色如深漆繞口或白色皆死病人面失精光如土色不飲食者四日死病人及健人面色忽如馬肝望之如青近之如黑必卒死赤色如馬黑色如烏見面死原注口兩旁左名烏右名馬非肝病少愈而卒死者青白色大如拇指黶點見顏頰上此必卒死凡人肝前病目則為之無色若肝前死目則為之脫精若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則旬日之間心病少愈而卒死者赤黑色黯點如博棋見顏度年上此必卒死凡人心前病則口為之開張若心前死則面色枯黑語聲不轉若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則不出旬日之間脾病少愈而卒死者青黑如拇指黶點見顏頰上此必卒死凡人脾前病唇則焦枯無潤若脾前死唇則干青白漸縮急齒噤不開若天中等分墓色應之必死不治看色厚薄決判賒促賒則不盈四百日內促則不出旬日之間肺病少愈而卒死者赤黑如拇指黶點見顏頰上此必卒死凡人肺前病鼻則為之孔開焦枯若肺前死鼻則為之梁折孔閉青黑色若天中等分墓色應之必死不治看色淺深斟酌賒促遠不出一年促不延時月腎病少愈而卒死者黃黑色黶點如拇指應耳此必卒死凡人腎前病耳則為之焦枯若腎前死耳則為之䵟黑焦癖若天中等分墓色應之必死不治看應增損斟酌賒促賒則不出四百日內促則不出旬日之間凡五臟吉凶之色見於分部肝病者順順而見青白入目必死不出其年若年上不應三年之內禍必至也心病者胐胐而見赤黑入口必死不出其年名曰行屍若年上無應三年之內病必死也脾病者霏霏而見黑黃入唇不出其年若年上不應三年之內禍必至也肺病者順順而見赤白入鼻必病不出其年若年上不應三年之內禍必應也腎病者其人天中等分發色不正此是陰陽官位相法若不遭官事即應死也面目黃黑連耳左右年四十以上百日死若偏在一邊最凶必死兩邊有年上無三年之內禍必至也面部五色吉凶雜述篇鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒必兼濕也色白者亡血也設微赤非時者死其目正圓者痓不治又色青為痛色黑為勞色赤為風色黃者小便難色鮮明者有留飲金匱要略面青人中反者三日死面無光牙齒黑者死面色黑目直視惡風者死面色黑脅滿不能反側者死面色蒼黑卒腫者死上中藏經赤色見於耳目及顴頰者死在五日中顴頰一作額黑色出於額上髮際下直鼻脊兩顴上者亦死在五日中黑色起耳目鼻上漸入於口者死謂起於耳或目或鼻漸入於口病人及健人黑色若白色起入目及鼻口死在三日中肝病皮白肺之日庚辛死心病目黑腎之日壬癸死脾病唇青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫唇黃脾之日戊己死上脈經面目五色生克篇按面主氣主陽主六腑目主血主陰主五臟凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也素問春面色青目色赤新病可療至夏愈此面色生目色也夏面色赤目色黃新病可療至季夏愈季夏面色黃目色白新病可療至秋愈秋面色白目色黑新病可療至冬愈冬面色黑目色青新病可療至春愈論曰此四時王相本色見故療之必愈夫五臟應五行若有病則因其時色見於面目亦猶灼龜於裡吉凶之兆形於表也病人本色青欲如青玉之澤有光潤者佳面色不欲如青藍之色若面白目青是謂亂常以飲酒過多當風邪風入肺絡於膽膽氣妄泄故令目青雖雲天救不可復生矣脈經千金方並作面黃目青此面色克目色也病人本色赤欲如雞冠之澤有光潤者佳面色不欲赤如赭土若面赤目白憂恚思慮心氣內索面色反好急求棺槨不過十日死病人本色黃欲如牛黃之澤有光潤者佳不欲黃如灶中黃土若面青目黃者五日死病人著床心痛氣短脾竭內傷百日復愈欲起彷徨因坐於地其立倚床能治此者是謂神良病人本色白欲如璧玉之澤有光潤者佳面色不欲如白堊若面白目黑疑當作青無復生理也此謂酣飲過度榮華已去血脈空索雖遇岐伯無如之何脈經無酣飲過度句病人本色黑欲如重漆之澤有光潤者佳面色不欲如炭色若面黑目白八日死腎氣內傷也脈經無也字下有病因留積四字以例推之目白當作目赤病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黑者不死黑如炲死病人面目俱等者不死俱等謂不改其常無一部之獨異也上千金翼方傷寒面部五色應證篇凡看傷寒必先察色然後切脈問證參合以決死生吉凶夫色有青黃赤白黑見於面部皮膚之上其氣有如亂絲亂髮之狀隱於皮里也蓋五臟有五色六經有六色皆見於面以應五行相生者吉相剋者凶滋榮者生枯夭者死自準頭年壽命宮法令人中皆有氣色其滋潤而明亮者吉暗而枯燥者凶也又當分四時生克之理而通察之茲略具五色傷寒之要者列於下以備覽此準繩陶節庵同青色屬木主風主寒主痛乃足厥陰肝經之色也凡面青唇青者陰極也若舌卷囊縮者急宜溫之如夾陰傷寒小腹痛則面青也內經曰青如翠羽者生青如草滋者死青而黑青而紅相生者生如青白而枯燥者相剋乃死也脾病見青氣多難治赤色屬火主熱乃手少陰心經之色在傷寒見之而有三陽一陰之分如足太陽屬水寒則本黑熱則紅也經曰面色緣緣正赤者陽氣拂鬱在表汗不徹故也當發其汗若脈浮數表熱汗不出者面色紅赤而光彩也經言陽明病面合赤色者不可攻之合者通也謂表邪未解不可攻裡也若陽明內實惡熱不惡寒或蒸蒸發熱或日晡潮熱大便秘結譫語面赤者此實熱在裡可攻之也如表裡俱熱口燥舌乾飲水脈洪面赤里未實者且未可下宜人參白虎湯和之如少陽經熱在半表半裡面紅脈弦者宜小柴胡湯和之不可下也經言少陰病下利清穀裡寒外熱面赤者四逆湯加蔥白主之此陰寒內極逼其浮火上行於面故發赤色非熱也若不細察誤投涼劑即死矣又夾陰傷寒虛陽上泛亦面赤也但足冷脈沉者是又煩躁面赤足冷脈沉不能飲水者此陰極也宜溫之若久病虛人午後面兩頰顴赤者此陰火也不可作傷寒治之然三陽之氣皆會於頭額其從額上至巔頂絡腦後者太陽也從額至鼻下於面者陽明也從頭角下耳中耳之前後者少陽也但有紅氣或赤腫者以此部分別之蓋大頭傷寒證正要知此部分也內經言心熱顏先赤脾熱鼻先赤肝熱左頰先赤肺熱右頰先赤腎熱頤先赤若赤而青赤而黃為相生則吉如赤而黑為相剋則凶蓋印堂準頭有赤氣枯夭者死明潤者生也如肺病見赤氣則難治黃色屬土主濕乃足太陰脾經之色黃如橘子明者熱也黃如熏黃而暗者濕也凡黃而白黃而紅相生則吉若黃而青相剋者凶也若準頭年壽印堂有黃氣明潤者病退而有喜兆也若枯燥而夭者死凡病欲愈目眥黃也長夏見黃白則吉若黃而青則凶也白色屬肺金主氣血不足也乃手太陰肺經之色肝病見之難治凡年壽印堂白而枯夭者凶白而光潤者吉若白而黑白而黃相生皆吉白而赤相剋即凶矣凡傷寒面白無神者發汗過多或脫血所致也黑色屬水主寒主痛乃足少陰腎經之色血因寒而瘀敗之色凡黑而白黑而青相生則吉黑而黃相剋則凶若準頭年壽印堂黑氣枯夭者死黑中明潤者生也黑氣自魚尾相牽入太陰者死黑氣自法令人中入口者死耳目口鼻黑氣枯夭者死凡面準頭命宮明潤者生枯暗者死若心病見黑氣在額者死也華佗曰凡病人面色相等者吉不相等凶又曰聲色心性但一改常即死矣此其大略也上準繩青而黑者多寒痛青而白者主虛風也厥陰熱厥血熱而壅滯氣迫塞而不得通亦有唇面爪甲青紫而脈伏者然細察之其脈必附骨有力也以下五條出張石頑凡已見準繩者刪去以免繁複面赤多熱而有表裡虛實之殊太陽證頭痛發熱喘而面赤者為表證陽明腑實汗多而面赤者為里證陰盛格陽與夾陰傷寒發熱頭病面赤足冷脈沉細或浮數無力按之欲散亦有浮盛有力按之弦細或數道不聚起伏甚小治宜以辛溫重藥加沉墜之品大劑急服使藥力直趨下焦略佐以清肅上焦使浮陽內合也為虛陽上泛傷寒壞病汗下過多元氣耗散微陽失守皆面赤戴陽此宜溫固收攝並宜滋潤不可辛烈並宜溫補下元按陰盛格陽與陰虛陽越判然兩途前人每統以陰病立論混施溫補誤人不少面黃主濕黃而明者兼熱黃而暗者兼寒黃而帶赤者為病欲愈黃白不榮而多蟹爪紋者為蟲積黃而浮澤者為內傷蓄血黃黑而粗槁者為食積黃而青黑者脾胃衰極為木勝土而木無制也是久病血敗也黃乃血水相合之色以黃之深淺辨血之厚薄以黃之明暗定血之死活白主氣虛語與準繩同不俱錄黑主腎衰傷寒顏帶青黑為陰寒之色若久病焦黑者又為腎熱也神庭黑色如指者陰晦之色見於正陽之位卒死之兆面慘不光傷寒也面光不慘傷風也面如錦紋陽毒也面垢如油喘促多汗足陽明中暍也面垢生塵灑然毛聳手少陰中暑也上張石頑青主驚青而脫色驚恐也青而赤者為肝火青赤而晦滯者為鬱火以下五條出脈如凡已見上兩篇者刪節免復赤色主熱面赤如微酣或兩顴淺紅遊移不定此陰證戴陽必下利清穀必小便清白或淡黃脈沉細或浮數無力按之欲散雖煩躁發熱而渴欲飲水卻不欲咽肌雖大熱而按之不熱且兩足必冷又有面赤煩躁遍舌生瘡生刺斂縮如荔枝狀或痰涎湧盛喘急小便頻數口乾引飲兩唇焦裂喉間如煙火上衝兩足心如烙脈洪數無倫按之有力捫其身烙手此腎虛火不歸原所致證最難辨但病由內傷其來以漸是乃乾柴烈火不戢自焚者也若面赤目脈赤身熱足寒頭熱而動搖卒口噤背反張者痙也寒濕風邪內傷於筋亦有熱病筋燥而急者黃色屬脾主濕熱食積黃而枯癯者胃中有火黃而色淡胃氣虛也面目黃而小便短澀者為疸小便自利少腹硬痛為蓄血發黃宜下其瘀白色屬肺主氣血虛寒縱有虛火斷無實熱白而青氣血寒凝白而肥有痰白而瘦爪甲鮮赤氣虛有火也黑色屬腎主寒痛青黑為陰寒焦黑齒槁為腎熱凡青黑黯慘無論病之新久總屬陽氣不振溫病面部五色應證篇內經刺熱論專論赤色所見部位以決五臟吉凶已錄入面部首篇又熱病順逆色證已錄入形部順逆篇茲不復贅以省繁文天地不外燥濕病亦不外燥濕色亦不外燥濕燥屬天氣色多有光而浮濕屬地氣色多有體而晦光體義見前察色真訣篇風燥寒燥由外搏來主收斂收斂則急面多繃急而光潔燥搏津液痰飲外溢於面色多紅潤而浮夾濕多紅潤而晦燥邪化熱色多幹紅苗竅乾澀多煩渴甚則變枯而青黑枯而青黑則真陰虧極而色無光體矣寒濕內生色必滯暗變黃變黑皆沉晦不明濕兼風色潤而浮多自汗濕與暑合與熱合或濕土鬱蒸之溫邪三者皆由口鼻吸入三焦主蒸散蒸散則緩面色多鬆緩垢晦甚者濁邪由內蒸而外溢如油膩煙燻者然若由濕化燥則又晦而且干晦而干則濕邪未去真陰又虧色由無光而無體矣經言色見部位內應臟腑外辨病證之說不可枚舉亦不能盡拘所當權於其大以燥濕二字為綱以兼風兼寒兼暑化火未化火為權衡以色中之光體為神氣大道不外是矣醫原雜病面部五色應證篇青色出於太陰太陽兩額左為太陽右為太陰及魚尾正面口角如大青藍葉怪惡之狀者肝氣絕主死若如翠羽柏皮者只是肝邪有驚病風病目病之屬以下五條出徐春甫古今醫統紅色見於口唇及三陰三陽上下如馬肝之色死血之狀者心氣絕主死若如橘紅馬尾色者只是心病有怔忡驚悸夜臥不寧等證白色見於鼻準及正面如枯骨及擦殘汗粉者為肺絕丙丁日死若如膩粉梅花白綿者只是肺邪咳嗽之病有孝服之憂黃色見於鼻乾燥如土偶之形為脾氣絕主死若如桂花雜以黑暈只是脾病飲食不快四肢怠惰妻妾之累黑色見於耳輪廓內外命門懸壁如汙水煙煤之狀為腎氣絕即死若如蜘蛛網眼鳥羽之澤者只是腎虛火邪乘水之病肺主氣氣虛則色白腎屬水水涸則面黧青為怒氣傷肝赤為心火炎上萎黃者內傷脾胃紫濁者外感客邪惟悴黯黑必悒鬱而神傷消瘦淡黃乃久病而體憊山根明亮須知欲愈之疴環口黧黑休治已絕之腎張三錫面黑為陰寒面青為風寒青而黑主風主寒主痛黃而白為濕為寒為熱為氣不調青而白為風為氣滯為寒為痛也大抵黑氣見於面為病最凶若暗中有光準頭年壽亮而滋潤者生枯夭者死王宇泰黃屬脾胃若黃而肥盛胃中有痰濕也黃而枯癯胃中有火也黃而色淡胃中本虛也黃而色黯津液久耗也黃為中央之色其虛實寒熱之機又當以飲食便溺消息之白屬肺白而薄澤肺胃之充也肥白而按之綿軟氣虛有痰也白而消瘦爪甲鮮赤氣虛有火也白而夭然不澤爪甲色淡肺胃虛寒也白而微青或臂多青脈氣虛不能統血也若兼爪甲色青則為陰寒之證矣白為氣虛之象縱有失血發熱皆為虛火斷無實熱之理蒼黑屬肝與腎蒼而理粗筋骨勞勩也蒼而枯槁營血之涸也黑而肥澤骨髓之充也黑而瘦削陰火內戕也蒼黑為下焦氣旺雖犯風寒亦必蘊為邪熱絕少虛寒之候赤屬心主三焦深赤色堅素稟多火也赤而䐃堅營血之充也微赤而鮮氣虛有火也赤而索澤血虛火旺也赤為火炎之色只慮津枯血竭亦無虛寒之患大抵火形之人從未有肥盛多濕者即有痰嗽亦燥氣耳石頑色貴明潤不欲沉夭凡暴感客邪之病不妨昏濁壅滯病久氣虛只宜瘦削清癯若病邪方銳而清白少神虛羸久困而嫵媚鮮澤咸非正色五色之中青黑黯慘無論病之新久總屬陽氣不振唯黃色見於面目而不至索澤者皆為向愈之候若眼胞上下如煙煤者寒痰也眼黑頰赤者熱痰也眼黑而行步艱難呻吟者骨節疼痛痰飲入骨也眼黑而面帶土色四肢痿痹屈伸不便者風痰也病人見黃色光澤為有胃氣干黃者是津液之槁目睛黃者非癉即衄目黃大煩為病進三昧仲景云脈和其人大煩目重瞼內際黃者為欲解也不得遽指為病進面目色同為順色異為逆同者謂其如常而未改也異者謂其一部獨異於常也面色夭然不澤其脈空虛為奪血傷寒汗不出大顴發赤噦者死顴見青氣者死黃兼青紫脈芤者瘀血在胃或脅內有塊面上多白點是蟲積面色青黃白不常及有如蟹爪路一黃一白者主食積亦有白斑如錢大暈滿額面者目睛黃者酒疸面黃白及腫連眼胞者谷疸其人必心下痞面黑者女勞疸一曰黑疸明堂眼下青色多欲勞傷精神不爽即夜未睡李士材色診目色應病類目部內應臟腑部位篇五臟六腑之津液盡上滲於目目者肝之官也肝開竅於目目藏精於肝肝者主為將使之候外欲知堅固視目大小目下果大其膽乃橫水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也據此是下胞屬脾也予歷診亦以下屬脾上屬胃為合足少陽之筋結於目眥為外維其病也頸維筋急從左之右右目不開足太陽之筋為目上綱足陽明之筋為目下綱其病也寒則筋急目不合熱則筋縱目不開手太陽之筋屬目外眥手少陽之筋屬目外眥足之陽明手之太陽筋急則口目為噼眥急不能卒視手少陰之脈系目系其病目黃脅痛掌中熱痛手太陽之脈至目銳眥其支者至目內眥其病目黃足太陽之脈起於目內眥其病目黃目似脫項似拔手少陽之脈至目銳眥其病目銳眥痛足少陽之脈起於目銳眥其支者復至目銳眥後其病目銳眥痛足厥陰之脈連目系從目系下頰裡足陽明有夾鼻入於面者屬口對入系目本足太陽有通項入於腦者正屬目本名曰眼系病苦頭目痛入陰出陽交於銳眥陽氣盛則瞋目陰氣絕則瞑目絕極也謂不交於陽也足陽明胃脈上至目內眥陰蹺之脈合太陽陽蹺而上行至於目內眥故目內眥痛者取之陰蹺邪客於足陽蹺之脈令人目痛從內眥始診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病上並出內經首尾赤眥屬心滿眼白睛屬肺其烏睛圓大屬肝其上下肉胞屬脾而中間一點黑瞳如漆者腎實主之楊仁齋黑珠屬肝白珠屬肺瞳人屬腎大角屬大腸小角屬小腸大外小內上胞屬脾下胞屬胃夏禹鑄按其赤絡屬於心目胞形色應證篇凡已見面目五色生克篇門戶井灶篇者不復重具以省繁文當與前後諸篇參看蹺脈氣不榮則目不合以下出內經視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也凡上下胞壅起者皆脾胃有濕眼胞上下如煙煤者寒痰也以下出李士材目下灰色為寒飲眼黑頰赤為熱痰眼黑而行走艱難呻吟者寒濕入骨也眼黑而面赤如土色四肢痿痹屈伸不便者風痰也眼上下有青色暈者多欲勞傷精神不爽即夜未睡面黃白及腫連眼胞者谷疸其人必心下痞大眥破爛肺有風也小眥破爛心有熱也上胞腫脾傷也下胞青色胃有寒也脾間積熱及宿食不消則生偷針按小兒目胞微腫者常也以其乳食胃中濕氣當盛也若腫甚者中有停滯也壯年目胞腫不退者是生而脾氣不足常受肝制其人多怒而少壽目睛形色應證篇十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛按凡病雖劇而兩眼有神顧盼靈活者吉以目為五臟十二經之精氣所發見也五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精不相比也則精散精散則視歧視歧見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而睛明也目者心之使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也太陽之脈其終也戴眼少陽終者耳聾目睘絕系陽明終者口目動作五陰氣俱絕則目系轉轉則目暈目暈者死目正圓者痓不治精明者所以視萬物別黑白審短長以長為短以白為黑如是則精衰矣骨槁肉脫氣喘目陷目不見人即死能見人至其所不勝之時而死腎脈微滑為骨痿坐不能起起則目無所見千金方曰人有風疹必多眼昏先攻其風其暗自愈陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可視耳閉不可聽氣脫者目不明脫陰者目盲熱病目不明者死髓海不足腦轉耳鳴脛酸目無所見也目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中目色青黃赤白黑者病在筋目黃爪甲上黃者黃疸診寒熱瘰癧有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死見赤脈不上下貫瞳子者可治也診目赤脈法又詳部位篇診癰疽白眼青黑眼小者逆不治內經咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止仲景白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自盛也凡目暴赤腫起羞明隱澀淚出不止暴翳目矇皆火熱所為也子和勇視而睛轉者風也直視不轉者肝絕也黑珠純黃凶證也白珠色青肝風侮肺也淡黃色脾有積滯也老黃色乃肺受濕熱疸證也瞳子屬腎無光采又兼發黃腎氣虛也黑珠變黃腎水為脾土所克若濕熱新病猶有可治久病身重不能轉側無論濕寒濕熱均難措手石頑體肥氣盛風熱上行目昏澀者胸中濁氣上行也重則為痰厥亦能損目常使胸中氣清無此病也暴失明者是陽為陰閉當有不測之疾翳膜者風熱重也或斑入眼此肝氣盛而發於上也當發散而去之若疏利則邪氣內蓄翳反深矣當以掀發之物使其邪氣再動翳膜乃浮輔以退翳之藥則自去矣病久者不能速效當以歲月除之醫說目疼陽明表證目赤經絡熱盛目瞑漱水鼻燥為陽邪上盛欲解必衄目黃而頭汗欲疸目不了了陽明腑實若睛不和者少陰熱也目眩為痰因火運目白睛黃欲發癉也目直視不能眴或白睛黃此誤發汗將欲衄也目正圓者痓不治下後目閉為陰血受傷目反上瞪為陰氣上逆石頑此條傷寒肝開竅於目燥病則目光炯炯濕病則目光昏蒙燥甚則目無淚而乾澀濕甚則目珠黃而眥爛或眼胞腫如臥蠶目有眵有淚精采內含者為有神氣無眵無淚白珠色藍烏珠色滯精采內奪及浮光外露皆為無神凡病開目欲見人者為陽閉目不欲見人者為陰目能識人者輕昏眊不識人者危其直視斜視上視下視目睛微定移時稍動者有因痰閉使然又不可竟謂之不治也醫原此條溫病難經謂病人閉目不欲見人者脈當弦當是肝邪有餘色診舌色應病類舌部舌色內應臟腑篇附咽喉胃足陽陰之脈循喉嚨胃足陽明之別上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹卒喑肝足厥陰之脈循喉嚨之後上入頏顙其病咽乾小腸手太陽之脈循咽下膈病則咽痛脾足太陰之脈夾咽連舌本散舌下病則舌本強痛心手少陰之脈從心系上夾咽病則咽乾心手少陰之別系舌本其病虛則不能言腎足少陰之脈循喉嚨夾舌本其病舌乾咽腫膀胱足太陽之筋入結舌本腎足少陰之筋結於枕骨與足太陽之筋合按合則亦入結舌本矣上出內經舌者心之竅也凡病俱見於舌舌尖主心舌中主脾胃舌邊主肝膽舌根主腎江筆花舌之尖屬心經中心至根屬腎經兩旁肝膽四邊脾經四邊謂中心之四圍平面之處也兩旁謂極邊兩側向外之處也鋪面白苔是肺經此謂本來自有之白苔也滿舌皆是胃經又舌尖是上脘所管中心是中脘所管舌根是下脘所管此舌上一定之部位也胡玉海傷寒一書至論顏色黃苔胃經黑苔脾經紅苔膽經紫紅苔腎經苔上起楊梅刺焦乾黑中有紅點者是肝經再純黑亦是脾經鮮紅有刺亦是膽經此各經一定之顏色也其或黑與黃間紅與紫呈白與黃雜紅與黑形此兼經互呈之顏色也同上按苔無紅色是舌質也前人皆苔質不分今特辨之如下舌質舌苔辨新訂前人之論舌診詳矣而只論舌苔不論舌質非不論舌質也混苔與質而不分也夫舌為心竅其伸縮展轉則筋之所為肝之用也其尖上紅粒細於粟者心氣夾命門真火而鼓起者也其正面白色軟刺如毫毛者肺氣挾命門真火而生出者也至於苔乃胃氣之所熏蒸五臟皆稟氣於胃故可藉以診五臟之寒熱虛實也若推其專義必當以舌苔主六腑以舌質主五臟舌苔可刮而去者氣分之事屬於六腑不可刮即漸侵血分內連於臟矣舌質有變全屬血分與五臟之事前人書中有所謂舌苔當分有地無地者地即苔之裡層不可刮去者也亦無與於舌之質也嘗見人無他苦但苦常滑遺視其舌中心如錢大光滑無苔其色淡紫又見患胃氣痛者其舌質常見通體隱隱藍色此皆痰血阻於胃與包絡之脈中使真氣不能上潮故光滑不起軟刺是血因寒而瘀也通體隱藍是濁血滿布於細絡也故舌苔無論何色皆屬易治舌質既變即當察其色之死活活者細察柢里隱隱猶見紅活此不過血氣之有阻滯非臟氣之敗壞也死者柢里全變干晦枯萎毫無生氣是臟氣不至矣所謂真臟之色也故治病必察舌苔而察病之吉凶則關乎舌質也以下諸篇所論已詳讀者當細思之按劉河間極論玄府之功用謂眼耳鼻舌身意皆借玄府以成其功用者也上言舌體隱藍為濁血滿布於細絡細絡即玄府也所謂濁血滿布是血液之流通於舌之玄府者皆夾有汙濁之氣也或寒氣凝結或痰涎阻滯於胃與包絡之脈中致血液之上潮者不能合於常度即汙濁之氣生矣非必其血腐敗而後然也若果敗血滿塞於中有不舌強硬而死者耶舌苔有根無根辨新訂脈有有根無根之辨舌苔亦何獨不然前人只論有地無地此只可以辨熱之浮沉虛實而非所以辨中氣之存亡也地者苔之裡一層也根者舌苔與舌質之交際也夫苔者胃氣濕熱之所熏蒸也濕熱者生氣也無苔者胃陽不能上蒸也腎陰不能上濡也前人言之晰矣至於苔之有根者其薄苔必勻勻鋪開緊貼舌面之上其厚苔必四圍有薄苔輔之亦緊貼舌上似從舌里生出方為有根若厚苔一片四圍潔淨如截頗似別以一物塗在舌上不是舌上所自生者是無根也此必久病先有胃氣而生苔繼乃胃氣告匱不能接生新苔而舊苔僅浮於舌面不能與舌中之氣相通即胃腎之氣不能上潮以通於舌也驟因誤服涼藥傷陽熱藥傷陰乍見此象者急救之猶或可復若病勢纏綿日久漸見此象真氣已索無能為矣常見寒濕內盛之病舌根一塊白厚苔如久經水浸之形急用溫里此苔頓退復生新薄苔即為生機又常見病困將死之人舌心一塊厚苔灰黃滯黯四面無輔此陰陽兩竭舌質已枯本應無苔而猶有此者或病中胃強能食五臟先敗而胃氣後竭也或多服人參無根虛陽結於胸中不得遽散其餘焰上蒸故生此惡苔甚或氣絕之後半日胸中猶熱氣口脈猶動也傷寒舌苔辨證篇一出胡玉海傷寒一書大旨是論濕溫為傷寒後半截事頭痛身熱惡寒脈浮滑陽明太陽身熱口燥脈弦滑陽明少陽身熱舌苔白脈洪滑正陽陽明舌苔微黃正陽陽明舌苔前白後黃正陽陽明按是上寒下熱外寒內熱前黃後白正陽陽明按是上脘化熱而中焦有水飲四圍白中間黃正陽陽明白帶灰色陽明將入太陰白帶有路陽明太陰微白燥黃色陽明太陰粉白微紅陽明少陽無白微桃紅陽明少陰前半紅後半白少陽太陰前半紅後半黃少陰太陰前半黃後半黑陽明太陰前半黃後半赤太陰少陰前半黃後半紫太陰厥陰純黑色太陰純黃色太陰黃分八字陽明太陰一邊黃一邊白陽明太陰一邊黑一邊黃陽明太陰焦黑太陰潤黑太陰花黃灰黑陽明太陰純紅鏡面太陰其形色光如漆桌如光而不濕舌下華池皆乾者重宜細審之舌厚如三個厚少陰舌闊如三個闊少陰舌圓少陰舌平無尖少陰按舊謂舌邊缺如鋸齒者死白苔有一點點紅陽明少陽白苔有一點點黑陽明太陰白苔有一點點黃正陽陽明尖紅後赤少陰少陽尖赤後紫少陰少陽以上三十五法乃辨證之大略余照此類推之可也廣東福建浙江江南揚州分野魚鹽海濱之地腸胃脆薄氣盛血熱所以風邪一客即病頭雖痛不如斧劈項雖強尚可轉側背雖牽制尚可動搖風邪入胃肺則凝塞所以一日為風二日為熱三日為火熱甚之故熱與風邪相搏凝塞成毒此毒胃主肌脾主肉不在肉而在肌肌毛竅之內也故點點然如斑之狀如疹之形紅色鮮明一日三潮三日九潮故毒必三日雖不治亦疏散也脈左寸浮右關滑氣口大無有正傷寒也故太陽經雖病不病此陽明之正病也謂之陽明太陽舌苔白一日不口渴二日不大便至三四五六日大便解則腠理開汗出而解如陽明第四日血熱成毒不能發越毒郁在中腠理不開郁遏邪熱則傳入少陽一日口渴左關洪大右關洪滑右寸氣口閉遏此肺經熱邪沖遏氣道不舒斑在肌腠血凝在皮少陰雖然受熱而未嘗著病二日目赤舌苔紅耳鳴左關脈洪大而數此熱甚邪勝也第三日譫語不欲眠右關洪滑而實四日斑出則少解斑不出狂叫不安右關滑實有力左關脈洪數微弦左尺脈虛大此邪氣將入於裡第五日耳聾不欲眠起坐不休譫語欲狂此斑毒不得發越口乾消水舌苔紅黃色邪尚未曾傳裡也舌苔紅紫色將入於脾左關弦右關實乙木怒極熱鬱之甚耳聾腎之火閉也斑毒出於胸項脊背此陽邪有餘隱於胸項脊背此陽毒將陷入陰分六日大便解邪氣得下斑必發出六日不解火氣閉於幽門小便短澀毒反熏胃肺閉大腸熱目直視不欲見人脈數舌焦邪傳太陰目黃面黃此風勝濕鬱第七日耳聾口渴目黃兩頰黃赤舌苔焦脈與六日同此病尚在陽分未除邪雖入里猶可挽回少陽不得解邪傳入里流入太陰脾經一日右關洪大而軟左關絃動左寸閉此熱邪客於包絡神昏氣短白珠紅肺經鬱抑斑毒則頸項上見者紅色兩頰無有心胸不見季脅有微點腹上點點紅色手臂前俱有紅色舌苔黃黑雖然傳裡陽證未除二日右寸見弦脈風邪客於肺將發白斑氣促者死鼻扇者死耳聾者生面頰紅者生閉目不欲見人者生魚口鴉聲者死第三日右關數左寸不見右尺洪大此邪熱客於腎唇紫舌焦黑目直視不欲見人此毒鬱於小腸燥糞不得下斑隱在肉內怒狂叫罵者生口渴消水者生小便不滋潤者死第四日左寸閉左關弦左尺洪大右關虛軟右寸見芤脈右尺不見血熱在中焦斑見藍色第五日左右手寸關脈不見兩尺洪大聲嘶欲哭斑郁不得發越目黃身黃者死第六日尺寸俱無兩關弦緊舌苔濕滑此火甚感寒頭涼即死舌苔燥裂仍為火論或陽明第五日斑發不透邪毒不入少陽竟入太陰此非越經傳也或飲食所傷或藥餌所誤太陰一二日季脅痛下痢左關弦軟右關弦長氣口脈洪尺脈大口渴甚嘴唇乾舌燥神氣清舌苔黃厚黑灰色第三日舌根黑中黃尖白目赤面青左關脈數右關滑大有力肺脈大兩尺脈閉頭面有斑頸項無斑胸背有斑肚腹無斑此陽氣不得發越陰氣凝塞太陰四日左三部閉右關軟肺脈大尺脈洪口渴甚目紅面赤鼻青唇黑者死伏斑下陷太陰五日尺寸俱浮右關芤左關緊時作寒戰頭痛目赤鼻黑舌青唇紫者死斑毒乘於肝非傳厥陰邪中厥陰也太陰之脈利於無力邪入於脾氣盛血熱流於四肢分布百骸貫注於心心神失專其權是以相火之邪甚熾心神與相火失位則一身無所主矣故四肢百骸俱痛腹滿口乾舌黃舌黑唇燥五臟與大小腸膀胱三焦皆受其制脈之細小者胃氣不傷脈之滑大者胃氣已壞胃主納穀脾主消穀胃主受納脾主轉濡胃之受納在於肺脾之轉濡在乎肝在上者為痰在下者為糟粕膈氣實則痰滯於膻中心氣熱則糟粕滯於小腸渴欲飲冷者膈氣熱也飲水不小便者肺葉焦也肺氣盛者則大腸之道不行夫邪在陰分不利見陽脈病在陽分不利見陰脈太陰之病利於細小虛軟不利於洪大滑實通其經絡導其閉塞毋使風木成邪致人九竅不通而死太陰之脈非獨取右關左寸左關右尺皆可概見也獨肺居華蓋肺氣凝澀更利於細小不利於實大與正傷寒之病傳入太陰皆脈大者病進脈小者病退有力者病進無力者病退滑實者病進虛軟者病退緊實者病進芤軟者病退洪數者病進細軟者病退如病之外現目紅面紅舌紅唇紅手足搖動坐立不寧舌苔焦黑此毒邪熾盛脈見細小此皆有胃氣不可謂不治也如目青面青唇青舌白脈見微細者毒氣下陷將出汗而死矣太陰病面赤目赤唇紫舌黑兩關見數脈者危見促脈者死面白目赤鼻青唇青舌苔灰色左尺右關見緊脈者死目赤面黃鼻扇唇青右寸見數脈關脈見弦脈兩尺不應者死神氣如常舌苔微黑兩關見革脈者死舌黃目青面白唇白脈見微弱手足厥冷身發白斑者死舌光如鏡目紅面青兩關洪大兩尺洪數兩寸不應毒陷下焦頸項斑不出者死舌上芒刺苔色灰黑腹胸脹滿渴甚不欲飲水右寸見極右關見軟左關見澀結胸者死舌尖平季脅痛舌苔焦黑時下清水口渴不欲飲湯水左尺見結左寸見代右關見牢熱結小腸死舌苔黃白點點紅紫唇青面白目赤左關見軟右關見澀肺脈不應者死舌苔厚白上灰黑色脾部乾燥唇紅目赤面白兩尺不應左關見軟右關沉實兩寸不應頸項發白斑者死舌苔紅紫目赤面黃唇乾胸滿神氣昏沉手足厥冷右關不應左關弦緊左尺空大斑毒陷下者死舌焦圓厚華池乾燥唇焦齒黑目紅面赤神氣昏憒脈見細小頻叫不知人者死知人者可生大便頻解不知人者死大便頻解漸知人者可生舌不出口發戰者死大便解後舌不潤轉者死不治大便解後神氣倏清舌雖潤即出汗者死大便解後脈見狂大必定血從口鼻出急服更衣散一服使肝分得涼藏血可生如遲吐血必死夫病至太陰死證已多若傳入少陰則邪盛正衰危者十九死者亦多傳入厥陰則風木成邪九竅將閉不必為之細論矣此篇所論與溫病相出入先生亦謂非正傷寒病也凡舌紅面赤而兩手見陰脈或脈來搖擺無根恍惚難憑舌上肝膽部位有一點點紫泡如黃豆大者此熱毒歸臟不治之證在左者重在右者輕在中間而不在肝膽部位者更輕察其脈可救者須救之舊謂舌邊缺如鋸齒者死即此義也傷寒舌苔辨證篇二出張石頑傷寒緒論中間略據鄙見補註舌苔之名始於長沙以其邪氣結里如有所懷故謂之胎一謂之苔如地之生苔者傷寒邪在表則苔不生邪熱傳裡則苔漸生自白而黃黃而黑黑甚則燥裂矣要以滑潤而白者為表邪灰黑濕潤無苔為陰寒此即舌質之變色也灰黑薄滑為夾冷食皆不可用寒涼攻下之劑然中暑夾血多有中心黑潤者又不可拘此說若黃黑灰色而乾燥紋裂者為熱極萬無虛寒夾血之理亦有因極熱忽地飲冷而胃口之血瘀結見黑苔者惟屢經汗下舌雖干而有微薄苔卻無燥裂芒刺此為津液耗亡不可誤認實熱而攻之必致不救金鏡三十六治法舉世宗之又觀舌心法一百三十八圖條分縷析辨證最詳其間論紅為瘟熱紫為酒毒黴醬為夾食藍為肝臟純色迥出前人未備所嫌捨本逐末未免繁紊無綱領因括其捷要辨論於下如白苔者邪傷氣分肺主氣而色白又主皮毛故凡白苔猶帶表證仲景以為胸中有寒止宜和解禁用攻下攻下必致結痞變證不測若溫病熱病一發便壯熱昏憒燥渴舌正赤此即舌質而有白滑苔即當用白虎湯汗之白虎湯雖可生汗初起總宜略加表藥時疫初起舌上白苔如積粉者達原飲解之若傷寒邪入胃腑則白苔中黃邪傳少陰則白中變黑若純色為一經證邊與中間兩色俱傳經證若從根至尖直分兩路者是合病與夾陰舌也合病則白中兼兩路黃夾陰則白中兼兩路黑潤及灰色也從根至尖橫分兩三截苔色者是並病舌也合病並病分別含混合病者一邪而傷兩經也或雖由此經傳彼經而仍是寒邪謂兩經合病於一邪也並病者此經寒邪蘊為彼經熱病或一經而有寒熱之兩病謂兩邪並病於一身也舌苔之直分橫截與此渾不相涉直分二三路者以表裡分也中間為里兩邊為表左為肝膽右為脾胃橫分兩三截者以三焦分也尖為上焦中為中焦根為下焦視其色以決其寒熱虛實也故尖白根黃尖白根黑及半邊苔滑者雖證類不同皆屬半表半裡白苔多而滑黃黑苔少者表證多也尚宜和解黃黑苔多而白苔少或生芒刺黑點乾燥者里證多也必下無疑雖中心黃黑而滑潤邊白者此為表證未盡所謂表證未盡即風寒尚未全化熱也鄙見即化熱仍是表邪與真正里證總是不同傷寒則大柴胡兩解之溫熱時疫則涼膈散或白虎合承氣攻下之又傷寒壞病雖白而厚甚燥裂者此為邪耗津液宜小柴胡稍加芒硝微利之純白滑苔為胃虛寒飲結聚膈上之候每於十三四日過經致變不可泛視也一種白厚苔如煮熟色到底不變者必里挾寒物留滯不散致脈伏不出乃心脾氣絕肺氣受傷也慎不可下寒滯不化可用溫下宜枳實理中湯熱甚合小陷胸下之至於能食自利而白苔滑者為臟結難治也黃連湯連理湯備急丸選用間有得生者黃苔者陽明腑實也黃濕而滑者為熱未盛結當未定不可便攻攻之必致初硬後溏也冬時宜確守此例俟結定乃攻不得已大柴胡微利之若在夏月一見黃苔便宜攻下以夏月伏陰在內多有下證最急而苔不燥者不可泥也若黃而燥者為熱已盛峻下無疑黃而生芒刺黑點者為熱勢極黃而瓣裂者為胃液干下證尤急也諸黃苔皆屬胃熱分緩急輕重下之有種根黃而硬尖白而中不甚干亦不滑短縮不能伸出譫妄煩亂者與前條半表半裡證不同此痰挾宿食佔據中宮也大承氣加生薑半夏主之有舌色青紫此即舌質而苔卻黃厚甚則紋裂但覺口燥舌仍不幹者此陰證夾食也青紫是有瘀血非陰證也是濕邪蘊積深陷於血分之象脈或沉細而伏或虛大而澀按其心下或臍旁硬痛結痰與瘀血相挾多有此脈象證候而時失氣者若常失氣非有宿食燥屎即當為氣脫矣急宜大承氣另煎生附子佐大黃下之若脈虛大者黃龍湯主之熱極煩躁者更加生地麥冬夏月尤宜若冬時陰證夾食而舌上苔黃不燥者宜用附子理中合小承氣下之大抵舌有積苔雖見陰象亦是虛中有實急當攻下無疑但下法與尋常不同耳又中宮有痰飲水血者舌多不燥不可因其不燥而延緩時日致誤也凡溫病熱病稍見黃白苔無論燥潤即宜涼膈雙解時行疫癘稍見白苔即宜白虎達原若見黃黑無論乾溼大承調胃急奪無疑黑苔者少陰腎色也血分瘀濁之極也燥硬而隱隱見紫者是因熱灼以致血敗柔潤而隱隱見淡者水飲結而氣不流行以致血瘀也若五六日後熱傳少陰火乘水位亢極之火不為水衰反兼水化五行空談陋習也此只是熱邪深入陰液全乾血瘀氣濁發見枯滯之死色也如火過炭黑是也始因表證失汗所以瘀也致邪入少陰下之即愈然有屢下熱不減苔不退者此必宿食留滯於中宮也宜黃龍湯加炮薑川連有誤用汗下太過津液枯竭所以瘀也而苔燥黑者此為壞病須量人虛實為治虛者其苔必薄而潤生脈散合附子理中實者其苔必厚而燥生脈合黃連解毒解毒即三黃湯一則陰虛陽亢一則陽虛陰亢不可不審熱勢盛劇則黑苔上生芒刺及燥裂分隔瓣者須用青布蘸薄荷湯拭潤更以薑片刮去芒刺撅起隔瓣看刺下瓣底即舌質也色紅可治急下之若俱黑不治矣又黑苔腐爛者心腎俱絕舌黑而捲縮者肝絕皆不可治舌黑及灰或黃而發疱生蟲腐爛雖為濕熱亦屬肝傷俱為危候又中間一路潤黑燥苔質潤而苔燥也兩邊或黃或白者兩感舌也此或夙有蓄血內正虛外邪實非兩感也篇中說兩感皆未合邊黃則調胃承氣邊白則大柴胡下之若中間一路黑滑薄苔兩邊白滑此表裡俱虛胃中雖有留結急宜附子湯溫之凡黑苔多凶心氣為瘀血所阻邪氣內潰甚速黑而乾燥或芒刺瓣裂皆為實熱急宜下奪黑薄濕潤或兼白滑者皆為陰寒急當溫經也一種中黑而枯或略有微刺色雖黑而中無積苔舌形枯瘦而不甚赤此即舌質其證煩渴耳聾身熱不止大便五六日或十餘日不行腹不硬滿按之不痛神識不昏晝夜不得睡稍睡或呢喃一二句或帶笑或嘆息此為津枯血燥之候急宜炙甘草湯或生料六味丸換生地合生脈散加桂滋其化源庶或可生誤與承氣必死誤與四逆亦死凡舌苔或半黃半黑或半黃半白或中燥邊滑或尖干根潤皆為傳並之邪寒熱不和之候大抵尖黑稍輕根黑至重黃黑宜大承氣兼白者宜涼膈散分緩急下之若全黑為死現舌不治心血全瘀夏月熱病邪火時火內外燔灼苔黑易生猶可攻治冬月傷寒舌苔全黑決難救也此乃指黑而潤者是血因寒而瘀夏熱瘀易行冬寒瘀難行也若熱瘀即冬夏皆凶然中暑誤認外感而加溫復多致中黑邊極紅而潤脈必虛大急用白虎湯清之虛者加人參竹葉如更誤認陰寒而與熱藥必致煩躁不救也夏月中暑多有黑舌黑而中乾者白虎無疑黑而滑潤或邊白者必夾寒食前以此為兩感為表裡俱虛此以為夾寒食當以此文為得之然尚遺卻蓄血一證蓄血有寒有熱亦辨於苔之潤燥也夾痰者多見灰色之苔總因邪氣關及血分致此古法用大順散然不若理中合小陷胸最當若直中少陰真寒始病不發熱舌心便黑色如此必昏厥矣非由黃白變化其苔雖黑而滑舌亦瘦小此真臟寒必厥冷自利嘔吐脈沉遲四逆附子輩急溫之稍緩則不可救灰黑舌者足三陰互病如以青黃和入黑中則為灰色也痰水主於脈中致血微停瘀也然有傳經直中之殊蓋傳經熱邪始自白苔而黃黃而灰黑或生芒刺黑點紋裂乾燥不拘在根在尖俱宜攻下泄熱有淡灰色中起深黑重暈者此病久寒熱互結或夙有痰飲蓄血又新加以停滯也若因內傳一次即見一重也於理難通或者邪氣化寒化熱化燥化濕轉變一次即增一重亦或傷冷傷熱傷食傷飲多傷一次即增一重也乃溫病熱毒急用涼膈雙解治之熱毒內傳一次見暈一重傳二三次見二三重也若見三重者不治若直中三陰始病無燥熱便見灰色舌潤無苔更不變別色者此必內夾寒食及冷痰水飲或蓄血如狂等證當隨證治之又有感冒夾食屢經汗下消導二便已通而舌上灰黑未退或濕潤或雖不濕亦不幹燥者不可因其濕誤認為寒妄投姜附亦不可因其不潤誤與硝黃此因汗下過傷津液虛火上炎所致其脈必虛微少力治宜救陰為急雖無心悸脈代當用炙甘草湯主之內有生地阿膠麻仁麥冬之甘潤可以滋陰潤燥蓋陽邪亢盛則用硝黃以救陰陰血枯涸則宜生地以滋陰可不辨乎紅色者心之正色也若紅極為溫熱之毒蘊於心胃及瘟疫熱毒內盛也若濕者不可便下解毒湯或白虎紅中有白苔者更感非時之寒也桂枝白虎湯紅中夾兩路灰色苔者溫熱而夾寒食也涼膈散加消導藥一二味紅中有黑苔者熱毒入少陰也大承氣合白虎湯紅極有黃黑芒刺者熱毒入腑也調胃承氣湯紅極有紫紅斑及遍身發斑者陽毒入心也人參白虎湯加犀角黃連紅極而紋裂者燥熱入肝也大承氣加柴胡白芍甚則加芩連坑爛者濕熱入脾也小承氣加芩連半夏白疱者火氣燔灼也浮淺不入血脈止起白疱三黃石膏去麻黃紫瘡者火氣鬱伏也解毒湯紅星者即紅珠鼓起也心包火炎也涼膈散一種柔嫩如新生望之似潤而燥涸殆甚者為妄行汗下津液竭也多不治急宜生脈散和人參三白湯主之舌痿不能轉動者肝絕舌忽瘦而長心絕也紫色者酒後傷寒也世俗庸愚往往受寒不服湯藥用薑蔥酒發汗汗未當而酒毒藏於心包多有此證有化為濕溫者有化為酒毒者推其所以皆由寒氣束於大表酒力不能外行而內積於胃與包絡也若純紫或中間略帶白苔而潤者宜葛根湯加石膏若紫中有紅斑或紫而干黃紫而短縮俱宜涼膈散下之若全紫而干如煮熟肝者死肝色也其證必厥冷脈必沉滑血脈瘀阻陽郁不達此陽極似陰也急宜當歸四逆湯加酒大黃下之再加桃仁然多不救當歸四逆尚嫌近補大黃又嫌泄氣此證宜宣散而化血通脈使血開氣達大抵深紫而赤者是陽熱酒毒宜用苦寒解毒宜重化瘀若淡紫而帶青滑者是則中腎肝陰證急宜吳茱萸湯四逆湯溫之宜兼化瘀然亦有中心生薄青紫苔或略帶灰黑而不燥不濕下證復急者此熱邪傷於血分也犀角地黃湯加酒大黃微利之紅紫二舌均指舌質言之固無紅苔亦斷無紫苔其有見紫苔者必舌面已腐或微黑苔與赤紅相映而然也黴醬色苔舌者乃夾食傷寒也食填太陰郁遏不得發越久之盦而成醬色也其證腹滿時痛者桂枝加枳樸橘半痛甚加大黃因冷食不消加炮薑厚朴甚則調胃承氣加炮姜下之如胃氣絕脈結代唇吊齒燥下利者死按此即沉香色也總是血瘀氣濁所致濕熱夾痰亦常有之不僅夾食也藍苔色舌者肝臟純色也含糊傷寒日久屢經汗下失於調理致胃氣傷極心火無氣脾土無依則肺金不生肝木無制侮於脾土故苔色如靛或兼身生藍斑乃心脾肺三臟氣絕於內也必死如微藍色而不甚深或略見藍紋者為木受金傷臟氣未絕脈不沉澀而微弦者可治此語極有道理惜欠發明沉澀者正氣不至脈形斷續不勻也微弦者氣能至而血阻之故脈形繃急也小柴胡加肉桂炮姜主之按常見癇厥及胃氣久痛者舌體全藍此亦瘀血在胃肝氣不舒也故青黑藍絳皆謂之濁皆涉血分須辨寒熱燥濕及痰血宿食燥屎症塊而治之總以鬆動血分為主舌之證類雖繁不外八種苔色撮其大要亦辨證之一助也張石頑傷寒緒論溫熱舌苔辨證篇出葉天士溫熱論若三焦不從外解必致里結里結於何陽明胃大腸也凡人之體脘在腹上其位居中或按之痛或自痛或痞脹當用苦泄以其入腹近也必驗之於舌舌苔或黃或濁可與小陷胸湯或瀉心湯隨證治之或白不燥或黃白相兼或灰白不渴慎不可遽投苦泄其中有外邪未解里先結者或邪菀未伸或素屬中冷者雖有脘中痞悶宜從開泄宣通氣滯以達歸於肺如近俗杏蔻橘桔等是輕苦微辛具流動之品可耳再前云或黃或濁須要有地之黃若光滑者乃無形濕熱中有虛象大忌前法其臍以上為大腹或滿或脹或痛此必邪已入里矣表證必無或十之存一亦要驗於舌或黃甚或如沉香色或老黃色或中有斷紋皆當下之如小承氣湯加檳榔青皮枳實元明粉生首烏等若未現此等舌不宜用此等法恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹又當以別法治之再黃苔不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑可也再論其熱傳營舌色必絳絳深紅色初傳絳色中兼黃白色此氣分之邪未盡也泄衛透營兩和可也純絳鮮澤者包絡受病也宜犀角鮮生地連翹鬱金石菖蒲等延之數日或平素心虛有痰外熱一陷里絡就閉非菖蒲鬱金所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也再色絳而舌中心乾者乃心胃火燔劫爍津液即黃連石膏亦可加入若煩渴煩熱舌心干四邊色紅中心或黃或白者此非血分也乃上焦氣熱爍津急用涼膈散散其無形之熱再看其後轉變可也慎勿用血藥以滋膩難散至舌絳望之若干手捫之原有津液此津虧濕熱熏蒸將成濁痰蒙閉心包也再有熱傳營血其人素有瘀傷宿血在胸膈中挾熱而摶其舌色必紫而暗捫之濕當加入散血之品如琥珀丹參桃仁丹皮等不爾瘀血與熱為伍阻遏正氣遂變如狂發狂之證若紫而腫大者乃酒毒衝心若紫而干晦者腎肝色泛也難治舌色絳而上有黏膩似苔非苔者中挾穢濁之氣芳香逐之舌絳欲伸出口而抵齒難驟伸者痰阻舌根有內風也舌絳而光亮胃陰亡也急用甘涼濡潤之品若舌絳而乾燥者火邪劫營涼血清火為要舌絳而有碎點白黃者當生疳也大紅點者熱毒乘心也用黃連金汁其有雖絳而不鮮乾枯而痿者腎陰涸也急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也其有舌獨中心絳乾者此胃熱心營受灼也當於清胃方中加入清心之品否則延及於尖為津干火盛也舌尖絳獨干此心火上炎用導赤散瀉其腑再舌苔白厚而乾燥者此胃燥氣傷也滋潤藥中加甘草含甘守津還之意舌白而薄者外感風寒也當疏散之若白乾薄者肺津傷也加麥冬花露蘆根汁等輕清之品為上者上之也若白苔絳底者濕遏熱伏也當先泄濕透熱防其就干也勿憂之再從里透於外則變潤矣初病舌就干神不昏者急加養正透邪之藥若神已昏此內匱矣不可救藥又不拘何色舌上生芒刺者皆是上焦熱極也當用青布拭冷薄荷水揩之即去者輕旋即生者險矣舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯證仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極化風而毒延口也用大黃磨入當用劑內則舌脹自消矣再舌上白苔黏膩吐出濁厚涎沫口必甜味也為脾癉病乃濕熱氣聚與穀氣相搏土有餘也盈滿則上泛當用省頭草芳香辛散以逐之則退若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從膜原達出矣若舌無苔而有如煙煤隱隱者不渴肢寒知挾陰病如口渴煩熱平時胃燥舌也不可攻之若燥者甘寒益胃若潤者甘溫扶中此何故外露而里無也若舌黑而滑者水來剋火為陰證當溫之若見短縮此腎氣竭也為難治欲救之加人參五味子勉希萬一舌黑而乾者津枯火熾急急瀉南補北若燥而中心厚㾦者土燥水竭急以鹹苦下之舌淡紅無苔者或干而色不榮者當是胃津傷而氣無化液也當用炙甘草湯不可用寒涼藥若舌白如粉而滑四邊色紫絳者溫疫病初入膜原未歸胃腑急急透解莫待傳陷而入為險惡之病且見此舌者病必見凶須要小心雜病舌苔辨證篇仍與傷寒溫病相出入舌之有苔猶地之有苔地之苔濕氣上泛而生舌之苔脾胃津液上潮而生故平人舌中常有浮白苔一層或浮黃苔一層夏月濕土司令苔每較厚而微黃但不滿不板其脾胃濕熱素重者往往終年有白厚苔或舌中灰黃至有病時脾胃津液為邪所郁或因瀉痢脾胃氣陷舌反無苔或比平昔較薄嘗診寒濕誤服涼劑呃逆不止身黃似疸而舌淨無苔脈象右關獨見沉細無力此脾胃氣陷之徵也凡水氣凌心胃陽下陷每忽變無苔日久即變暗變紫矣其胃腎津液不足者舌多赤而無苔或舌中有紅路一條或舌尖舌邊多紅點此平人舌苔之大較也嘗見平人舌心錢大一塊光亮淡紫色但常苦夢遺無他病也若夫有病則舌必見苔病藏於中苔顯於外確鑿可憑毫釐不爽醫家把握首賴乎此是不可以不辨風寒為寒燥之邪風溫為溫燥之邪風寒初起在表風溫首傷肺經氣分故舌多無苔即有黃白苔亦薄而滑漸次傳裡與胃腑糟粕相為摶結苔方由薄而厚由白而黃而黑而燥其象皆板滯不宣迨下後苔始化腐腐者宣松而不板實之象由腐而退漸生浮薄新苔一層乃為病邪解盡其有初起白苔即燥如白砂者名曰砂苔此溫燥之邪過重宜速下之佐以甘涼救液亦有苔至黑而不燥者或黃黑苔中有一二條白者或舌前雖燥舌根苔白厚者皆夾濕夾痰飲之故亦有苔雖黃黑澆薄而無地質者胃陰虛故也苔有地質與無地質此虛實之一大關也嘗見有舌根白苔板厚如水久泡形而兩邊現紅肉兩點者是下焦寒水盛結真陽不宣也濕為濁邪兼證最多風濕傷表苔多滑白不厚寒濕傷里苔多膩白而厚暑溫濕溫溫疫溫熱皆濕土鬱蒸之氣冬溫因陽不潛藏亦濕土鬱蒸之餘氣數者皆從口鼻吸入肺胃膜原由里而發春溫為冬傷於寒寒鬱久而化熱寒燥之氣又能搏束津液水飲伏於膜原與熱混合亦由里而發暑濕晚發名曰伏暑因夏傷暑濕伏於膜原秋日涼燥之氣又從外搏遏在內之暑濕此由表邪引動里邪而發暑濕瘧疾亦多由此是伏邪時邪皆由里發即多夾濕故初起舌上即有白苔且厚而不薄膩而不滑或粗如積粉或色兼淡黃迨傳胃化火與糟粕相摶方由白而黃而黑而燥其暑溫濕溫之邪多黃白混合似黃似白或黃膩或灰黃而皆不燥此等舌苔即有下證或大便不通不爽宜熟大黃緩下之以舌苔不燥腸中必無燥糞多似敗醬汁故不宜猛下此燥邪濕邪燥濕混合之邪舌苔之大較也上石芾南醫原舌者心之竅凡病俱現於舌能辨其色證自顯然舌尖主心舌中主脾胃舌邊主肝膽舌根主腎假如津液如常口不燥渴雖或發熱尚屬表證若舌苔粗白漸厚而膩是寒邪入胃夾濁飲而欲化火也此時已不辨滋味矣宜用半夏藿香迨厚膩而轉黃色邪已化火也用半夏黃芩若熱甚失治則變黑色胃火甚也用石膏半夏或黑而燥裂則去半夏而純用石膏知母麥冬花粉之屬以潤之至厚苔漸退而舌底紅色者火灼水虧也用生地沙參麥冬石斛以養之此表邪之傳裡者也其有脾胃虛寒者則舌白無苔而潤甚者連唇口面色俱痿白此或泄瀉或受濕脾無火力速宜黨參焦朮木香茯苓炙草乾薑大棗以振之虛甚欲脫者加附子肉桂若脾熱者舌中苔黃而薄宜黃芩心熱者舌尖必赤甚者起芒刺宜黃連麥冬竹捲心肝熱者舌邊赤或芒刺宜柴胡黑山梔其舌中苔厚而黃者胃微熱也用石斛知母花粉麥冬之類若舌中苔厚而黑燥者胃大熱也必用石膏知母如連牙床唇口俱黑則胃將蒸爛矣非石膏三四兩生大黃一兩加糞金汁人中黃鮮生地汁天冬麥冬汁銀花露大劑投之不能救也此唯時疫發斑及傷寒症中多有之嘗治一獨子先後用石膏至十四斤余而斑始透病始退此其中全恃識力再有舌黑而潤澤者此係腎虛宜六味地黃湯若滿舌紅紫色而無苔者此名絳舌亦屬腎虛宜生地熟地天冬麥冬等更有病後絳舌如鏡發亮而光或舌底嗌乾而不飲冷此腎水虧極宜大劑六味地黃湯投之以救其津液方不枯涸上江筆花醫鏡苔因內熱致脾氣閉滯不行飲食津液停積於內故苔見於外若脾氣不滯則飲食運化津液流通雖熱甚不必有苔也吾每診寒濕內盛者往往舌不見苔及服溫散之劑乃漸生白苔轉黃而病始愈矣舌青或青紫而冷滑者為寒證青紫而焦燥或脹大或捲縮者為熱證寒甚亦必捲縮筋脈得寒而收引也然必不焦燥凡舌強硬短縮而神昏語亂者不治亦有痰病而舌本硬縮及神昏不語者當以形證色脈參之熱病舌本爛熱不止者死傷寒陰陽易舌出數寸者死按此乃房勞復非陰陽易也上郭元峰脈如附產婦診唇舌辨母子生死法天中發黑色兩顴上發赤色應之者不出六十日兵死若年上發赤色應之者不出三十日死若命門上發赤色應之者相法以耳前為命門兩眉之間為命宮不出百日市死婦人產死兵死同千金翼方婦人臨產或難產之際欲知生死吉凶者但視產婦面青唇青舌青口吐涎沫大出不可止者母子俱死也唇見青色而舌赤者母死子活唇面俱赤如常獨舌青者子死母活上巢氏附小兒苗竅診法總論舌乃心之苗紅紫心熱也燻黑心火極也亦有寒濕淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫熱也破爛脾胃火也唇乃脾胃之竅紅紫熱也淡白虛也如漆黑者脾胃將絕也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也齒如黃豆腎氣絕也目乃肝之竅勇視而睛轉者風也直視而不轉睛者肝氣將絕也以目分言之又屬五臟之竅黑珠屬肝純是黃色凶症也白珠屬肺色青肝風侮肺也淡黃色脾有積滯也老黃色乃肺受濕熱疸症也瞳人屬腎無光采又兼發黃腎氣虛也大角屬大腸破爛肺有風也小角屬小腸破爛心有熱也上皮屬脾腫脾傷也下皮屬胃青色胃有寒也上下皮睡合不緊露一線縫者脾胃虛極也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也唇之上下屬腎坎水也五臟里也六腑表也小腸心之表小便短黃澀痛心熱也清長而利虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸肺之表閉結肺有火也肺無熱而便閉必血枯不可通下脫肛肺虛也膽乃肝之表口苦肝旺也聞聲著嚇肝虛也亦是心包有痰每聞聲即四肢驚掣膀胱腎之表居臍下氣海之右有名無形筋腫筋痛腎水之寒氣入膀胱也面有五色一曰紅紅病在心面紅者熱一曰青青病在肝面青者痛一曰黃黃病在脾面黃者脾傷一曰白白病在肺面白者寒一曰黑黑病在腎面黑而無潤澤腎氣敗也望其色若異於平日而苗竅之色與面色相符則臟腑虛實無有不驗者矣苗竅即千金方門戶井灶之義非僅以辨五臟之部位也臍風者風寒由臍入也發於七日之內亦有稟於先天者命火未全寒從臍下上衝故均名臍風風附木則鳴目乃肝之竅故兩眼角先有黃色肝邪克脾鼻準脾之竅故準頭又有黃色由脾犯腎故兩唇色黃而口撮舌強者腎邪犯心也初起吮乳必較前稍松兩眼角挨眉心處忽有黃色宜急治之黃色到鼻猶易治也到人中承漿治之稍難若已見唇口緊束舌頭強直不必治矣集成辨兒之稟厚者眼角準頭多見黃色然先生從親驗得來決非虛語稟厚者面色必赤其黃深隱而仍黃中透赤也臍風者面色必夭其黃浮滯也上夏禹鑄幼科鐵鏡山根之上有青筋直見或橫見者俱肝熱也有紅筋直見或斜見者俱心熱也黃筋見於山根或皮色黃者不拘橫直均脾胃之證或吐或瀉或腹痛或不思食上陳遠公法囟門凸起者肝腎肺胃風熱濕熱也下陷者或因先天不足或因泄利過度脾腎虛寒氣怯也疾跳或斷續無倫次者氣脫也新增外診雜法類診毛髮法須鬢陰腋諸毛詳前三陽上下氣血多少篇茲不復贅肺主身之皮毛腎合三焦膀胱三焦膀胱者腠理毫毛其應五臟傷敗毛悴色夭者死於臟氣所不勝之時也手太陰者行氣而溫於皮毛者也故氣絕則不榮皮毛皮毛焦則津液去皮節爪枯毛折手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤足少陰者伏行而濡骨髓者也氣絕則骨不濡肉不能著也骨肉不相親則肉軟卻故齒長而垢發無澤腎其華在發故丈夫八歲腎氣實齒更髮長五八腎氣衰發墮齒枯以上內經發者血之餘也心與小腸主血故小腸絕者發乾直如麻不得曲伸小兒病其頭毛皆上逆者死其發枯黃者心腎血氣俱不足也以上脈經足厥陰肝脈與督脈會於巔故勇士之怒發立上指平人肝熱其氣上衝頭皮一塊腫痛髮根為之粗硬而逆起以下四節新增附眉毫鼻毫平人眉忽生一長毫異於眾毛拔之三五日復生者膽中血熱也在小兒必生急風脈經曰膽絕眉為之傾平人鼻中忽生一長毫粗硬異於眾毛者肺中血熱也撥之三五日即復生久不治即生肺癰發背夏子益奇疾方有鼻生長毫硬如鐵絲觸之其痛徹心為肺大熱也發通五臟而尤切於心腎故病溫疫熱毒及服毒藥與飲酒大醉者以冷水浸其發又喉蛾急療等證察有赤發者急拔之是熱血上逆也診鼻法腎乘心心先病腎為應色皆如是男子色以黑色言在於面王為首腹痛首腹大腹下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子色在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝謂其色連人中為淫謂傷中淋露也有潤如膏狀謂鼻準色黑光浮而明如塗膏者為暴食不潔暴食即出不潔倉公所謂迥風其色赤大如榆莢在面王為不月內經鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痙不治此承上句說下非專論目也又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲末五句非專論鼻色仲景黃色見於鼻乾燥如土偶之形為脾氣絕主死若如桂花雜以黑暈只是脾病飲食不快四肢怠惰妻妾之累見前鼻頭色黑而枯燥者房勞黑黃而亮者有瘀血赤為肺熱鼻孔乾燥目瞑漱水不咽者欲衄也鼻孔黑如煙煤而燥者陽毒也鼻孔煽張者肺絕也但煤黑而不煽不喘者燥熱結於大腸也黃黑枯槁為脾火津涸大便燥結鼻塞濁涕者風熱也鼻孔冷滑而黑者陰毒也鼻頭汗出如珠為心脾痛極石頑醫通按前千金五色入門戶井灶篇已見者茲不復具覽者宜互觀之診人中法足太陰氣絕則脈不榮肌肉舌萎人中滿人中滿則唇反肉先死也甲篤乙死內經病人鼻下平者胃病也微赤者病發癰微黑者有熱青者有寒白者不治凡急痛暴厥人中青者為血實宜決之脈經凡中風鼻下赤黑相兼吐沫而身直者七日死按人中內應脾胃下應膀胱子戶凡人胃中與前陰病濕熱腐爛或瘀血凝積作痛者往往人中見赤顆小粟瘡或常見黑斑如煙煤晦暗者知其氣絡有相應也下痢臍下忽大痛人中黑色者死按此寒中於命門而胞中之血死也丹溪診唇法脾之華在唇四白其五色之診與面色同而唇皮薄色顯尤為易見其專診列下唇色青黃赤白黑者病在肌肉內經唇焦乾燥裂為脾熱唇赤腫為胃濕熱鮮紅為火盛淡白為氣虛淡而四繞起白暈為亡血青黑為寒為血死石頑醫通唇黑者胃先病微燥而渴者可治不渴者不可治渴為津耗血滯不渴為氣脫血死也仲景下二節同唇下內有瘡如粟名狐蟲蝕其肛唇上內有瘡如粟名惑蟲蝕其咽一作臟按凡腹痛喜渴面有白斑如錢大或唇色淡白而中有紅點者其為腸胃有蟲齧血無疑矣唇吻反青四肢漐習者肝絕環口青黧柔汗發黃者脾絕鼻黑唇腫者肺敗厥而唇青肢冷者為入臟即死凡下痢病劇而唇如硃紅者死按凡脫血病皆以此例決之丹溪凡口唇關手足陽明腸胃二經又關手足太陽脾肺二臟故驗唇色紅潤里未有熱但宜辛溫散表唇色枯乾里已有熱宜清裡唇色焦黑煩渴消水裡熱已極當用涼膈散等又有譫語發狂唇色乾焦服寒涼而熱不減此食滯中焦胃氣蘊蓄發黃發熱是以服寒涼則食滯不消用辛散則又助裡熱宜以保和散沖竹瀝蘿菔汁或梔子豆豉湯加枳實治之上唇屬肺與大腸若焦而消渴飲水熱在上主肺若焦而不消渴飲水熱在下主大腸有燥糞下唇屬脾與胃若焦而消渴飲水熱在陽明胃若焦而不消渴飲水熱在太陰脾夫裡熱唇焦食滯唇焦積熱伏於血分而唇焦惟以渴不渴消水不消水別之又有食滯已久蒸釀發熱亦能作渴消水又當參以脈象若脈滑大不數食未蒸熱口亦不渴若滑大沉數食已蒸熱口亦作渴故凡譫語發狂脈滑不數渴不消水者亦以食滯治之若以寒涼抑遏則譫狂益盛甚且口噤不語也秦皇士傷寒大白項腫如匏按之熱痛目赤如血而足冷便泄人事清明六脈細數右手尤軟略按即空沈堯封曰此虛陽上攻也唇上黑痕一條如干焦狀舌苔白如敷粉舌尖亦白不赤是皆虛寒確據況便瀉足冷脈濡斷非風火若是風火必痞悶煩熱燥渴不安豈有外腫如此而內里安貼如平人者乎案按按此即喻氏濁陰從胸上入即咽喉腫痹舌脹睛突從背上入即頸項粗大頭項若冰渾身青紫而死之類也末句辨症尤為精切不易最眩人者在熱痛目赤若非此著雖足冷便瀉脈濡而空猶未能決為真寒也又按近日吸洋菸者唇色多紫黯以其胃中血氣濁惡也所以然者肺氣不清而燥化勝也診齒法熱病腎絕齒黃落色如熟小豆或齒忽變黑者死久病齦肉軟卻齒長而垢或齒光無垢者死此所謂大骨枯槁也口開前板齒燥者傷暑也脈經齒齦無色舌上盡白唇里有瘡者䘌也按即狐惑也出巢氏溫熱病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血皆走其地病深動血結瓣於上陽血者色必紫紫如干漆陰血者色必黃黃如醬瓣陽血若見安胃為主陰血若見救腎為要然豆瓣色者多險若證還不逆者尚可治否則難為矣何以故耶蓋陰下竭陽上厥也齒若光燥如石者胃熱甚也若無汗惡寒衛偏勝也辛涼泄衛透汗為要若如枯骨色者腎液枯也若上半截潤靠根半截水不上承心火上炎也急急清心救水俟枯處轉潤為妥此必充發水中真氣方能有效非僅甘潤涼降所能為也若咬牙齧齒者濕熱化風痙病但咬牙者胃熱氣走其絡也若咬牙而脈證皆衰者胃虛無谷以內榮亦咬牙也何以故耶虛則喜實也舌本不縮而硬而牙關咬定難開者此非風痰阻絡即欲作痙證用酸物擦之即開木來泄土故也風能化燥酸即生津若齒垢如灰糕樣者胃氣無權津亡濕濁用事多死而初病齒縫流清血痛者胃火沖激也不痛者龍火內燔也總是悍氣竄入血道齒焦無垢者死齒焦有垢者腎熱劫胃也當微下之或玉女煎清胃救腎可也溫熱論齒根於沖督之脈故小兒齒出遲者以鹿茸肉蓯蓉服之凡小兒齒出偏斜稀疏者陽明本氣不足也齒色枯白者血虛也齒色黃暗或帶黑或片片脫下者面色青黃此腹中有久冷積太陽陽明之陽氣受困累及於沖督也落齒後久不出者腎與督虛也必重以鹿茸加補沖督藥否則出必偏斜稀疏甚者不久復碎落也俗每以為血熱殊不知是虛冷久積血不流通內蓄虛火也若有蟲者是濕熱亦因胃有積滯若不虛冷則面色自紅潤不慘黯也診耳法腎氣通於耳腎和則耳能知五音矣又心開竅於耳耳藏精於心內經少陽之經入於耳故傷寒以耳聾時眩欲嘔脈弦細數者為少陽經病是熱菀津耗三焦氣結不升降也耳中策策痛而耳輪黃者病名黃耳類傷寒也風入於腎卒然發熱惡寒脊強背急如痙狀醫通按濕熱下結於腎也耳輪焦枯如受塵垢者病在骨內經診爪甲法肝之華在爪爪為筋之餘內經肝熱者色蒼而爪枯肝絕者爪甲青而怒罵不休內經脈經肝應爪爪厚色黃者色謂爪下血色膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也內經身黃目黃爪甲黃者疸也爪甲青者厥也內經脈經手太陰氣絕爪枯毛折內經循衣撮空心虛敗證也若執持有力者內實也宜清之泄之石頑按爪內應筋爪之枯潤可以占津液之虛實也至於爪下之血色亦與面色同法按之不散與散而久不復聚者血死之徵也按法凡痛按之痛劇者血實也按之痛止者氣虛血燥也按之痛減而中有一點不快者虛中挾實也內痛外快為內實外虛外痛內快為外實內虛也按之不可得者陰痹也按之痠疼者寒濕在筋也石頑凡按之其血不散與散而久不復聚者血已死也散而聚之速者熱也聚之遲者氣滯與寒濕也新增水脹者足脛腫腹乃大以手按其腹隨手而起如裹水之狀膚脹者風寒客於皮膚𪔣𪔣然而不堅腹大身盡腫按其腹窅而不起腹色不變鼓脹者腹脹身大與膚脹等色蒼黃腹筋起也筋即脈也血與水相雜而汁變壞也內經風濕相搏骨節煩疼不得屈伸近之則痛劇汗出短氣惡風或身微腫者甘草附子湯主之近見一病飲食倍增身膚加肥惟骨節皮膚疼痛不能轉側其皮膚雖以一指輕點之亦即痛劇不可耐矣即此病也仲景凡身熱按之皮毛之分而熱重按久之不熱者熱在表在肺又為勞倦之虛熱也以熱之微甚分虛實按至肌肉血脈之分而熱輕重按之俱不見者熱在中焦在心脾在血分邪已入里也按至筋骨之分而熱者為陰虛骨蒸與濕熱深入骨髓也熱病內陷於骨者為肝腎陰絕也東垣肌之滑澀以徵津液之盛衰理之疏密以徵營衛之強弱肉之堅耎以徵胃氣之虛實筋之粗細以徵肝血之充餒骨之大小以徵腎氣之勇怯爪之剛柔以徵膽液之清濁指之肥瘦以徵經氣之榮枯掌之厚薄以徵臟氣之豐歉尺之寒熱以徵表裡之陰陽論疾診尺篇論之詳矣前卷形診中生形病形諸篇多有以摩按得之者不復瑣具可互觀也嗅法人病屍臭不可近者死脈經口氣重者胃熱盛也陽氣尚充其病雖劇可治汗出稠黏有腥膻氣或色黃者風濕久蘊於皮膚津液為之蒸變也風濕濕溫熱病失汗者多有之唾腥吐涎沫者將為肺癰也唾膿血腥腐者肺癰已成也肺傷風熱痰多臭氣如腐膿狀肺內自熱痰多腥氣如啖生豆狀一宜涼散一宜清降也小便臊甚者心與膀胱熱盛也不禁而不臊者火敗也大便色壞無糞氣者大腸氣絕胃敗也小兒糞有酸氣者停滯也病人後氣極臭者為胃有停食腸有宿糞為內實易治若不臭者在平人為氣滯病劇而出多連連不止者為氣虛下陷恐將脫也以上新訂參各家聞法角音人者主肝聲也肝聲呼其音琴其志怒其經足厥陰厥逆少陽則榮衛不通陰陽交雜陰氣外傷陽氣內擊擊則寒寒則虛虛則卒然喑啞不聲此為癘風入肝續命湯主之但踞坐不得低頭面目青黑四肢緩弱遺失便利甚則不可治賒則旬月之間桂枝酒主之若其人呼而哭哭而反吟此為金剋木陰擊陽陰氣起而陽氣伏伏則實實則熱熱則喘喘則逆逆則悶悶則恐畏目視不明語聲切急謬說有人此為邪熱傷肝甚則不可治若唇色雖青向眼不應可治地黃煎主之按癘風者清燥之氣即天地肅殺之氣也西醫謂之消耗之氣使人陽氣消索津液枯結血汁敗壞神明破散也若其人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未竟以手向眼如有所畏雖不即病禍必至矣此肝病聲之候也徵音人者主心聲也心聲笑其音竽其誌喜其經手少陰厥逆太陽則榮衛不通陰陽反錯陽氣外擊陰氣內傷傷則寒寒則虛虛則驚掣心悸定心湯主之語聲前寬後急後聲不續前混後濁口喎冒昧好自笑此為癘風入心荊瀝湯主之若其人笑而呻呻而反憂中藏經作笑不待伸而復憂此為水剋火陰擊陽陰起而陽伏伏則實實則傷熱熱則狂悶亂冒昧言多謬誤不可採聽此心已傷若唇口正赤可療其青黃白黑不可療也若其人本來心性和雅而忽弊急反常或言未竟便住以手剔腳爪此人必死禍雖未及名曰行屍此心病聲之候也宮音人者主脾聲也脾聲歌其音鼓其志愁其經足太陰厥逆陽明則榮衛不通陰陽翻祚陽氣內擊陰氣外傷傷則寒寒則虛虛則舉體消瘦語音沉澀如破鼓之聲舌強不轉而好嚥唾口噤唇黑四肢不舉身重如山便利無度甚者不可治依源麻黃湯主之若其人言聲憂懼舌本捲縮此是木剋土陽擊陰陰氣伏陽氣起起則實實則熱熱則悶亂體重不能轉側語聲拖聲氣深不轉而心急此為邪熱傷脾甚則不可治若唇雖萎黃語音若轉可治若其人本來少於瞋怒而忽反常瞋喜無度正言而鼻笑不答於人此脾病聲之候也不盈旬月禍必至矣商音人者主肺聲也肺聲哭其音磬其志樂其經手太陰厥逆陽明則榮衛不通陰陽反祚陽氣內擊陰氣外傷傷則寒寒則虛虛則癘風所中噓吸戰掉語聲嘶塞而散下氣息短憊四肢僻弱面色青葩遺失便利甚則不可治依源麻黃續命湯主之若言音喘急短氣好唾此為火剋金陽擊陰陰氣沉陽氣升升則實實則熱熱則狂狂則閉眼悸言非常所說口赤而張飲無時度此熱傷肺肺化為血不治若面赤而鼻不欹可治也若其人本來語聲雄烈忽爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此肺病聲之候也羽音人者主腎聲也腎聲呻其音瑟其志恐其經足少陰厥逆太陽則榮衛不通陰陽反祚陽氣內伏陰氣外升升則寒寒則虛虛則癘風所傷語言蹇吃不轉偏枯腳偏跛蹇若在左則左腎傷在右則右腎傷其偏枯分體從鼻而分半邊至腳緩弱不遂口亦欹語聲混濁便利仰人耳偏聾塞腰背相引甚則不可治腎瀝湯主之若呻而好恚恚而善忘恍惚有所思此為土剋水陽擊陰陰氣伏而陽氣起起則熱熱則實實則怒怒則忘耳聽無聞四肢滿急小便赤黃言音口動而不出笑而看人此為邪熱傷腎甚則不可治若面黑黃耳不應亦可治若其人本來不吃忽然蹇吃而好瞋怒反於常性此腎已傷雖未發覺已是其候見人未言而前開口笑還閉口不聲舉手叉腹此腎病聲之候也千金方心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦五臟者中之守也中盛臟滿氣盛傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也不得臥而息有音者是陽明之逆也起居如常而息有音者此肺之絡脈逆也不得臥臥則喘者水也不能正偃正偃則咳者風水也胃中不安氣上迫肺故也內經語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病息搖肩者胸中堅息引胸中上氣者咳息張口短氣者肺痿當唾涎沫吸而微數其病在中焦實也下之則愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治病並當作痛平人無寒熱短氣不足以息者實也師持脈病人呻者痛也搖頭言者里痛也言遲者風也風溫為病鼻息必鼾語言難出病深者其聲噦此腎氣之失根也其聲必微噦乃乾嘔呃噫之通名不必苦為分明也胃中虛冷不能食者飲水則噦胃氣下行以降為順虛則力不能降而氣逆矣是腎敗之漸也傷寒潮熱時時噦者與小柴胡湯噦而腹滿者視其前後何部不利利之則愈此皆熱結內實而氣上逆也濕家下之早則噦此丹田有熱胸上有寒此暖氣在下寒閉於上沖激而然也亦有痰閉而然者仲景經曰虛則鄭聲鄭聲者邪音也謂聲重而轉失其本音也凡汗下後或久病氣虛者往往語聲中變是正氣怯而音不能圓滿也故素問曰氣虛者言無常也靈樞曰五臟使五色修明而聲章聲章者言聲與平生異也譫語者言語謬妄非常所見也邪熱亂其神明故也胃中熱濁上蒸包絡有燥屎有瘀血有凝痰有血熱熱入血室皆有餘之證下之清之而愈宜養津液疏心包絡若亡陽譫語為神離其舍喃喃一二句斷續不勻是汗多津液無以養其心也初起可治急滋心陰稍久延即不治矣仲景曰身熱脈浮大者生逆冷脈沉細者不過一日死又曰直視譫語喘滿者死又曰循衣撮空直視譫語脈弦者生澀者死內經評熱論曰狂言者是失志失志者死此之謂也脈弦者內實也脈澀者內虛也出言懶怯先輕後重此內傷中氣也出言壯厲先重後輕是外感邪盛也攢眉呻吟苦頭痛也診時籲者鬱結也形羸聲啞癆瘵之不治者咽中有肺花瘡也暴啞者風痰伏火或暴怒叫喊所致也面起浮光久啞無外邪實證者心衰肺癟所謂聲嘶血敗久病不治也獨言獨語首尾不續思慮傷神也新病聞呃非火即寒久病聞呃胃氣欲絕也大抵聲音清亮不異於平時者為吉咳聲清脆者燥熱也緊悶者寒濕也續續片刻不止者風也日甚者風也夜甚者水也天明咳甚者胃有宿食寒濕在大腸也聽聲之法豈徒以五音決五臟之病哉須將患人之語言聲音輕重長短有神無神與病家來請之語及一切旁觀物議皆當審聽入耳注心斯乃盡聞之道也上參各家問法一問寒熱二問汗三問頭身四問便五問飲食六問胸七聾八渴俱當辨景岳八問凡診病必先問是何人或男或女或老或幼或婢妾僮僕問而不答必是耳聾須詢其左右平素何如否則病久或汗下所致診婦人必先問月信何如寡婦氣血凝澀兩尺多滑不可誤以為胎室女亦有之世道不古以問為末抱病不惟不言雖再三詢叩終亦不告反詆醫拙甚至有隱疾困醫者醫固為所困矣身不亦為醫所困乎雖然為醫者亦須貴乎有學大率診視已畢不可便指病名發言率易須從所得脈象說起廣引經說以為證據漸漸說歸病證務要精當確實不可支離狂妄說證已畢然後徐徐問其所苦或論說未盡患者已一一詳告卻以彼所說校吾所診或同或異而折衷之如此則彼我之間交相符契必收全功汪石山按醫者當問之事甚多必須診得脈真然後從脈上理路問去方得就緒若海概問之庸有當乎無怪令人相輕也內經曰明知逆順正行無問又曰謹熟陰陽無與眾謀是又有以問為戒者蓋病家所答往往依違影響未可盡信也若不能明知與謹熟也而徒以不問為高雖告之而反厭棄焉忽視人命其罪又當何如耶
