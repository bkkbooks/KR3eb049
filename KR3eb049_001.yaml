body:
  text: 卷上形診總義身形內應臟腑部位篇面竅體部五臟者肺為之蓋巨肩陷咽候見其外心為之主缺盆為之道䯏骨有餘以候𩩲𩨗肝者主為將使之候外欲知堅固視目大小脾者主為衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性六腑者胃為之海廣骸大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下裹大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑者也上下三等臟安且良矣五臟常內閲於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣五臟別論曰五氣入鼻藏於心肺心肺有病而鼻為之不利也肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能知五音矣五臟不和則六腑不通六腑不和則留結為癰癰同壅謂痞滿關格腫脹之類非專指瘡癰也肝開竅於目目藏精於肝肝病在頭在筋心開竅於耳耳藏精於心心病在五臟在脈脾開竅於口口藏精於脾脾病在舌本在肉肺開竅於鼻鼻藏精於肺肺病在背在皮毛腎開竅於二陰二陰藏精於腎腎病在溪在骨上面竅之分應臟腑也頭臟舌背溪以體段言皮毛肉脈筋骨以形層言肺應皮肺合大腸大腸者皮其應心應脈心合小腸小腸者脈其應脾應肉脾合胃胃者肉其應肝應爪肝合膽膽者筋其應腎應骨腎合三焦膀胱三焦膀胱者腠理毫毛其應視其外應以知其內臟即知所病矣膀胱言其氣之磅礴而光大也又言其體之孤懸無倚而光潔也爪為筋余齒為骨余肝生筋筋生心心生血血生脾脾生肉肉生肺肺生皮毛皮毛生腎腎生骨髓髓生肝心合脈也其榮色面之色也其主腎肺合皮也其榮毛其主心肝合筋也其榮爪其主肺脾合肉也其榮唇生氣通無論曰其華在唇四白其主肝腎合骨也其榮發其主脾合言其氣之所應也榮言其血之所華也此義生氣通天臟氣法時二篇最詳以文繁故録此東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央病在脾俞在脊俞應也非俞穴也金匱真言曰春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢診要經終四時刺逆從義均相類不復瑣具肝氣之病內舍胠脅外在關節心氣之病內舍膺脅外在經絡脾氣之病內舍心腹外在肌肉四肢肺氣之病內舍膺脅肩背外在皮毛腎氣之病內舍腰脊骨髓外在溪谷腨膝背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也肺心有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八墟者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留留之則傷筋絡骨節機關不得屈伸故病攣也上並出內經三焦者水穀之道路氣之所終始也上焦當心下胃上口主內而不出其治在膻中中焦在胃中脘主腐熟水穀其治在臍旁下焦當膀胱上口主分別清濁出而不內其治在臍下一寸故曰三焦其腑在氣街其腑在氣街謂其源在氣街之處即命門也腑會太倉臟會季脅筋會陽陵泉髓會絶骨一曰枕骨血會膈俞王勳臣血府之說正與此暗合骨會大杼脈會太淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也上體部之分應臟腑也諸會謂其氣之所聚非謂其所發源也上並出難經按頭面七竅可望而知筋骨血脈不可望也第事理所關不容缺略醫者所見謂之望病者所自見亦何不可謂之望又況此篇總義者實賅聞問於其中不獨文義相連無可割裂也身形內應臟腑病證篇出靈樞赤色小理者心小粗理者心大無𩩲𩨗音遏汙一讀曷於心蔽骨一名鳩尾者心高𩩲𩨗小短舉者心下𩩲𩨗長者心下堅𩩲𩨗弱小以薄者心脆𩩲𩨗直下不舉者心端正𩩲𩨗倚一方者心偏傾也心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗音冤一讀郁一讀悶而善忘難開以言心下則臟外謂臟體外露於肺下易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也司去聲白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則居賁迫肺善脅下痛肺堅則不病咳上氣肺脆則善病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也迫肺似當作迫肝肝體半在膈下半在膈上肺下即逼壓之故脅下痛賁膈也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅謂拄膈而迫於脅也悗為息賁肝下則逼胃脅下空肝下不得逼胃此胃當指小腸脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也脾小則臟安難傷於邪也脾大則苦湊䏚而痛湊迫也䏚音杪腰兩旁空軟處不能疾行脾高則䏚引季脅而痛脾下則下加於大腸則臟善受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也肝居胃後而附脊脾居胃下而附腹肝下即迫小腸脾下即迫大腸也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆好耳前居牙車者腎端正耳偏高者腎偏傾也腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷於邪腎高則其背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則善病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此諸變者持則安減則病矣五臟皆小者少病苦燋心大愁憂五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人平反復言語也燋音灼上敘五臟形證肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結也肺合大腸大腸者皮其應心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結也心合小腸小腸者脈其應脾應肉肉䐃手臂腿肚厚肉皆謂之䐃堅大者胃厚肉䐃麼者胃薄麼麼麼尖小也肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下脘約不利肉䐃不堅者胃緩肉䐃無小裹纍者胃急裹音果作里誤肉內堅結而大小成顆者肉䐃多小裹纍者胃結胃結者上脘約不利也脾合胃胃者肉其應肝應爪爪厚色黃者色即爪下肉色膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直約即爪上橫紋爪惡色黑多紋者膽結也肝合膽膽者筋其應腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也腎合三焦膀胱三焦膀胱者腠理毫毛其應上敘六腑外形故五臟有小大高下堅脆端正偏傾六腑有小大長短厚薄結直緩急視其外應以決其內臟即知所病矣形診生形類三人篇出靈樞人之肥瘦大小寒溫與其氣血多少各有度也何者人有肥有膏有肉膕肉堅皮滿者肥膕肉不堅皮緩者膏皮肉不相離者肉此言三人之形體也膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒此言寒熱是指其人本身氣血之寒熱非發寒發熱惡寒惡熱之病也凡人身皮肉之溫拊之各有輕重不同是本於稟賦也膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小此言肥瘦大小膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此言氣血多少此別於衆人者也衆人者皮肉脂膏不能相加也血與氣不能相多故其形不大不小自稱其身命曰衆人推論衆人故治者必先別其三形血之多少氣之清濁而後調之無失常經是故膏人者縱腹垂腴肉人者上下容大脂人者雖脂不能大也此概言治法並補醒三形陽人陰人篇出靈樞重陽之人熇熇高高言語善疾舉足善高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行矣重陽之人而神不先行者何也曰此人頗有陰者也何以知其頗有陰也曰多陽者多喜多陰者多怒數怒而易解故曰頗有陰其陰陽之離合難故其神不能先行也陽人血清而氣滑故喜怒即發而不留陰人血濁而氣滯故神思不能自暢遂陽陰相激而多怒矣經曰陰出之陽則怒以是知人之性情皆與氣血相關也五人篇出靈樞天地之間六合之內不離於五人亦應之非徒一陰一陽而已也故有太陰之人少陰之人太陽之人少陽之人陰陽和平之人此五人者其態不同其筋骨氣血各不等太陰之人貪而不仁下齊湛湛自下而齊於衆人湛湛然深藏不露好內音納而不出心和而不發不務於時動而後之之往也先審於心而後行此太陰之人也太陰太陽即前篇所謂陰人陽人也少陰之人小貪而賊心見人有亡常若有得亡如喪官失財此所謂幸災樂禍者好傷好害見人有榮乃反慍怒心疾狠也而無恩此少陰之人也太陽之人居處於於好言大事無能而虛說志發於四野舉措不顧是非為事好常自用事雖敗而常無悔此太陽之人也少陽之人諟諦好自貴有小小官則高自宜好為外交而不內附此少陽之人也陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊則謙謙談而不治是謂至治或與謂人有所與也談而不治謂議明事之義理而不刻期其效也上五節敘五人性情古之善用針艾者視人五態乃治之可知敘三人五人二十五人諸篇均為施治之本非徒託空言而已太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之少陰之人多陰少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審調之其血易脫其氣易敗也太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也少陽之人多陽少陰經小而絡大血在中而氣外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也強氣即人身之悍氣衛外者也剽悍滑疾見開而出故瀉絡即外脫而行疾陰陽和平之人其陰陽之氣和血脈調謹診其陰陽視其邪正安容儀審有餘不足盛則瀉之虛則補之上五節敘五人證治夫五態之人卒然新會未知其行也行即前敘性情何以別之別其形狀曰衆人之屬無如五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於衆者也太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂此太陰之人也未僂未至行而似伏之甚也少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也少陰形性之惡甚於太陰者以其稟氣更駁也太陽之人其狀軒軒儲儲反身折膕此太陽之人也少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背此少陽之人也陰陽和平之人其狀委委然隨隨然顒顒然愈愈然㼐㼐音旋然豆豆然衆人皆曰君子此陰陽和平之人也委隨貌之謙也顒愈容之和也㼐豆視之審也上五節敘五人形狀二十五人篇二十五人之形其態不合於衆也而陰陽之人不與焉血氣之所生別而以候從外知內先立五形金木水火土別其五色異其五形之人而二十五人具矣木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞於事能春夏不能秋冬秋冬感而病生足厥陰他他然太角之人比於左足少陽少陽之上遺遺然左角一曰少角之人比於右足少陽少陽之下隨隨然釱音杕角一曰右角之人比於右足少陽少陽之上推推然判角之人比於左足少陽少陽之下括括然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面脫當作鋭小頭好肩背髀腹小手足行安地疾心行搖肩背肉滿有氣輕財少信多慮見事明好顏急心不壽暴死能春夏不能秋冬秋冬感而病生手少陰核核然疾心即急心語意重出或疾心指其心之狠也質徵一曰太徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫一作熊熊然質判之人比於左手太陽太陽之下支支頤頤然土形之人比於上宮似於上古黃帝其為人黃色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太陰敦敦然太宮之人比於左足陽明陽明之上婉婉然加宮之人一曰衆之人比於左足陽明陽明之下坎坎然少宮之人比於右足陽明陽明之上樞樞然左宮之人比於右足陽明陽明之下一作上非兀兀然金形之人比於上商似於白帝其為人白色方面小頭小肩背小腹小手足如骨發踵外骨輕身清廉急心靜悍善為吏能秋冬不能春夏春夏感而病生手太陰敦敦然如骨發之如同而古通用釱商之人比於左手陽明陽明之上廉廉然右商之人比於左手陽明陽明之下脫脫然左商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽似於黑帝其為人黑色面不平大頭廉頤小肩大腹動手足發行搖身下尻長背延延然不敬畏善欺紿人戮死能秋冬不能春夏春夏感而病生足少陰汗汗然太羽之人比於右足太陽太陽之上頰頰然小羽之人比於左足太陽太陽之下紆紆然衆之為人一作加之人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然五正形外各有四兼形左右上下以經絡言諸然以形態言如今之浙人廣人齊魯之人湘湖之人可一望而辨之者第左右配合與五音五味篇異同互見未詳厥旨上二十五人形氣附形色相勝年忌是故五形之人二十五變者衆之所以相欺者也相欺難辨如得其形不得其色或形勝色或色勝形者至其勝時年加感則病行失則憂矣感於邪則為病若行事有失者必有憂患之禍也形色相得富貴大樂也對上憂字說其無病不待言矣其形色相勝之時年加者凡年忌下上之人統二十五人言大忌常加七歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無為奸事即行失也是為年忌上年忌觀此知人所生病類常與命相相關通矣年忌起於七歲九年一見今世明九暗九之說似本於此此衆人之所同也其勝時年加必以本相合逐年運氣求之如木形金色是色勝形而又行金運之年木形土色是形勝色而又行木運之年是也色勝形者死形勝色者病五變篇曰先立其年以知其時時高則起時下則殆雖不陷下當年有沖通其病必起是謂因形而生病也此即相家面部流年氣色之法謂面部不能端滿者若流年行至骨高之部即起病行至骨陷之部必危殆矣亦有端滿而病者必其年有沖通也沖通即勝時年加也或流年與本命干支相犯也上出靈樞附相家五形五色五聲出神相全編眉粗並眼大城廓更團圓此相名真水平生福自然水形主圓得其五圓氣色不雜精神不亂動止寬容行久而輕也又曰水不嫌肥又曰水形色黑要帶白忌黃又曰水聲圓急又飄揚上水形水色水聲欲識火形貌下闊上頭尖舉止全無定頤邊更少髯火形主明得其五露氣色不雜精神不亂動止敦厚臥久而安也又曰火不嫌尖又曰火形色紅要帶青忌黑又曰火聲焦烈上火形火色火聲稜稜形瘦骨凜凜更修長秀氣生眉眼須知晚景光木形主長得其五長氣色不雜精神不亂動止溫柔涉久而清也又曰木不嫌瘦又曰木形色青要帶黑忌白又曰水聲高暢上木形木色木聲部位要中正三停又帶方金形人入格自是有名揚金形主方得其五方氣色不雜精神不亂動止規模坐久而重也又曰金不嫌方又曰金形色白要帶黃忌紅又曰金聲和潤上金形金色金聲端厚仍深重安詳若泰山心謀難測度信義動人間土形主厚得其五厚氣色不雜精神不亂動止敦龐處久而靜也又曰土不嫌濁又曰土形色黃要帶紅忌青又曰土聲深厚如發甕中上土形土色土聲三陽上下氣血多少形狀篇足陽明之上血氣盛則髯美長血少氣多則髯短氣少血多則髯少血氣皆少則無髯兩吻多畫如宦者相足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒血少氣多則肉而善瘃瘃者皴裂血氣皆少則無毛有則稀枯悴善痿厥足痹痿厥痿厥並病後世所稱類中風者是也足少陽之上氣血盛則通髯美長通髯髯與發通俗名兜腮血多氣少則通髯美短血少氣多則少髯血氣皆少則無髯感於寒濕則善痹骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則脛毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足太陽之上血氣盛則美眉眉有毫毛毫即豪字毛中獨長出者血多氣少則惡眉面多少理多少言其多也血少氣多則面多肉血氣和則美色心主血脈其華在面此雖系足太陽而曰血氣和則心氣和可知矣足太陽之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋踵下痛美眉者足太陽之脈血氣多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而無澤者血氣俱不足手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以溫血氣皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手卷多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈脈即絡脈藍色隱見皮膚下者手太陽之上血氣盛則口多須面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒上指諸經之行頭面者下指其行手足者前篇左右上下部位義即指此審察其形氣有餘不足而調之按其寸口人迎切循其經絡之凝澀結而不通者此於身皆為痛痹甚則不行故凝澀凝澀者致氣以溫之血和乃止其結絡者脈結血不和決之乃行故氣有餘於上者導而下之氣不足於上者推而休之休疑其稽留不至者因而迎之必明於經隧乃能持之寒與熱爭者導而行之其菀即郁字陳血不結者則因也馬氏云作側非而豫上聲之必先明知二十五人則血氣之所在左右上下可知逆順矣總束上文末句叫醒大義上三陽上下氣血多少形狀附婦宦無須美眉者太陽多血通髯極須者少陽多血美須者陽明多血然則婦人無須者無血氣乎曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛婦人之生也有餘於氣不足於血以其數脫血也衝任之脈不榮唇口故須不生矣士人有傷於陰陰氣絶而不起陰氣即陰器非誤陰不用然其須不去而宦者獨去何也曰宦者其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生矣其有天宦者未嘗被傷不脫於血然其須不生何也曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不榮故須不生矣上婦宦無須附六經氣血多少陽明多血多氣太陽多血少氣少陽多氣少血太陰多血少氣一作少血多氣林億引楊上善太素云太陰與陽明表裡血氣俱盛當是多血多氣厥陰多血少氣一作多氣少血少陰多氣少血一作多血少氣是故刺陽明出血氣刺太陽出血惡氣惡去聲不欲出氣也刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陰出氣惡血也上六經氣血多少並出靈樞辨皮色不勝四時之風篇出靈樞春青風夏陽風秋涼風冬寒風凡此四時之風其所病各不同形黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風青色薄皮弱肉者不勝秋之虛風赤色薄皮弱肉者不勝冬之虛風也黑色而皮厚肉堅固不傷於四時之風其皮薄而肉不堅色不一者色不正黑長夏至而有虛風即病矣其皮厚而肌肉堅者長夏至而有虛風不病也必重感於寒外內皆然乃病故材木之異也皮之厚薄汁之多少而各不同木之早花先葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久陰淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎杌同糵辨壽夭肥瘦勇怯忍痛不忍痛勝毒不勝毒形狀篇形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄以立壽夭故形與氣相任則壽不相任則夭皮與肉相裹則壽不相裹則夭血氣經絡勝形則壽不勝形則夭故平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣何謂形之緩急也曰形充而皮肉緩者則壽形充而皮肉急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰氣衰則危矣若形充而顴不起者骨小骨小則夭矣形充而大肉䐃堅而有分者肉堅肉堅則壽矣有分謂有縱紋即所謂皮肉緩形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者也必明乎此而後可以臨病人決死生故牆基卑高不及其地者不滿三十而死其有因而加病者不及二十而死也人之壽百歲而死者使道隧以長基牆高以方通調榮衛三部三里起骨高肉滿百歲乃得終也故人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣其不能終壽而死者五臟皆不堅使道不長空音孔外以張喘息暴疾又卑基牆薄脈少血其肉不石即實字數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也脈出氣口色見明堂五色更出以應五時五官已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂見外五色乃治平博廣大壽中百歲見此者刺之必已如是之人血氣有餘肌肉堅緻故可苦以針矣五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角居外如是者雖平常殆況加疾乎上壽夭人之黑白肥瘦小長五十以上為老二十以上為壯十八以下為少六歲以下為小各有數也年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黑色唇臨臨然其血黑以濁其氣澀以遲其為人也貪於取與刺此者深而留之多益其數也瘦人者皮薄色少肉廉廉然薄唇輕言其血清氣滑易脫於氣易損於血刺此者淺而疾之刺常人者視其黑白各為調之其端正敦厚者其血氣和調刺此者無失常數也刺壯士真骨者堅肉緩節監監然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之重厚濁也徑蹻捷也嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也上肥瘦常人壯士嬰兒夫忍痛不忍痛者皮膚之厚薄肌肉堅脆緩急之分也非勇怯之謂也故勇士之不忍痛者見難則前見痛則止怯士之忍痛者聞難則恐遇痛不動勇士之忍痛者見難不恐遇痛不動怯士之不忍痛者見難與痛目轉面盼恐不能言失氣驚戰顏色無定乍死乍生夫勇士者目深以固長衡當是沖字直揚三焦理橫其心端直其肝大以堅其膽滿以傍平聲充溢於外怒則氣盛而胸張肝舉而膽橫眥裂而目揚毛起而面蒼此勇士之所由然也怯士者目大而不減陰陽相失三焦理縱𩩲𩨗短而小肝系緩其膽不滿而縱腸胃挺脅下空雖方大怒氣不能滿胸肝肺雖舉氣衰復下故不能久怒此怯士之所由然也上忍痛不忍痛並勇怯凡人之骨強筋弱肉緩皮膚厚者耐痛其於針石之痛亦然加以黑色而美骨者耐火焫矣堅肉薄皮者不耐針石火焫之痛也人之病同時而傷或易已或難已者其身多熱者易已多寒者難已也傷科氣滑血充者易復氣滯血少而濕多者每潰爛纏延人之勝毒不勝毒者胃厚色黑大骨及肥者皆勝毒其瘦而薄胃者皆不勝毒也勝毒者有病可用大寒大熱及諸毒藥重劑也上耐痛不耐痛勝毒不勝毒並出靈樞辨善病風厥消疸寒熱痹積聚善忘善飢不瞑多臥形狀篇出靈樞人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常有病矣人之善病風厥漉汗者肉不堅腠理疏故也何以候肉之不堅也曰膕肉不堅而無分理理者粗理粗理而皮不致者腠理疏此言其渾然者渾然謂未甚異於常人也人之善病消疸者五臟皆柔弱故也五臟脆與五臟脈微小者皆苦消疸何以知五臟之柔弱也曰夫柔弱者必有剛強剛強者多怒柔者易傷也言其性情剛強五志火盛臟體柔脆不勝其灼故津燥多怒此人薄皮膚而目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆胸中蓄積血氣逆留寬皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此言其人剛暴而肌肉弱者也人之善病寒熱者必其人小骨而弱肉也何以候骨之大小肉之堅脆色之不一也上句未及色蓋脫文一純也曰顴骨者骨之本也顴大則骨大顴小又骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汙然獨異天額角地頰車此其候也而又臂薄者其髓不滿故善病寒熱也人之善病痹者理粗而肉不堅也痹之高下有處各視其部部面之色部也義詳面色篇中人之善病腸中積聚者皮膚薄而不澤肉不堅而淖澤也如此則腸胃惡惡則邪氣留止積聚乃傷腸胃之間寒溫不次積聚有因飲食生冷胃中血液瘀凝有因風寒自經絡內襲日久痰血相裹結邪氣稍漸也至蓄積留止大聚乃起上五條出五變篇人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則榮衛久留於下不以時上故善忘也又曰氣並於上亂而善忘人之善飢而不嗜食者精氣並於脾熱氣留於胃胃熱則消穀谷消則善飢胃氣逆上則胃脘寒當是實字故不嗜食也人之病而不得臥者衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣人之病而目不得視者衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛則目常閉也人之多臥者其人腸胃大而皮膚濕而分肉不解也腸胃大則衛氣留久皮膚濕則分肉不解其行遲濕痰水也解利也凡人身傷於濕與多痰者其性皆好臥夫衛氣者晝行於陽經也夜行於陰臟也陽氣盡則臥陰氣盡則寤故衛氣留久而行遲者其氣不清目常欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解則衛氣留於陽者久故少瞑也此皆素性然也其卒然多臥者邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行亦有因胃實不寐者所謂胃不和則臥不安也或食填太陰或痰飲格於中焦故凡痰據於陽令人多臥痰據於陰令人不寐故卒然多臥矣上五條出大惑論按靈樞口問篇所論十二邪亦人之常病也但言榮衛氣血不及外診之形故不具録附壯不晝瞑老不夜瞑壯者之氣血盛其肌肉滑氣道通榮衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其榮氣衰少而衛氣內伐故晝不精夜不瞑也出營衛生會篇辨人身氣血盛衰時日篇人與天地相應日月相參故雖平居其腠理開閉緩急故常有時也月滿則海水西盛人氣血精肌肉充皮膚致毛髮堅腠理郤煙垢著當是之時雖遇賊風其入淺不深月郭空則海水東盛人氣血虛衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄膲同焦煙垢落當是之時遇賊風則其入深其病卒暴故得三虛者其死暴疾得三實者邪不能傷人也乘年之衰本命受流年剋制逢月之空月魄失時之和寒溫非時是為三虛逢年之盛遇月之滿得時之和是為三實上靈樞天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以天寒無刺天溫無疑行之無忌月生無瀉月滿無補月郭空無治是謂得時而調之陽氣者一日而主外日言晝也平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄上素問薄迫也削也氣陽而應日血陰而應月故暑則氣瀉寒則氣斂日中則氣壯日下則氣衰所謂日中得病夜半愈夜半得病日中愈者陰陽乘除故也月生人血漸盛月死人血漸減凡病在血分及失血諸證有血盛邪無所容而病退者有血減邪失所附而病亦退者若夫精神之復必在生明之候矣故仲景於瘧疾曰以月一日發當十五日愈設不瘥當月盡解瘧為衛邪入榮之病故以晦朔決瘥劇之期也昔嘗患暑下血以月滿得病血止後神明不復至次月朔日頓見爽朗矣世俗謂久病以朔望病勢增損定吉凶豈誣也哉經脈血氣似於形診無關靈樞曰營氣之病也血上下行東垣謂血上下行者面部乍肥乍瘦也血隨氣升即面胕而似肥血隨氣降即面消而似瘦元氣不足之人常有此象又曰營氣霈然者病在血脈是邪氣激其血脈光澤浮越於面部也觀此豈真無關形診耶形診病形類五臟病證總例篇諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝五行之勝即六氣之勝復也疏其氣血令其調達而致和平此之謂也東方生風風生木木生酸酸生肝肝生筋筋生心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在臟為肝其性為暄其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其眚為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸陰陽應象有在音為角在聲為呼在變動為握在竅為目南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在臟為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦陰陽應象有在音為徵在聲為笑在變動為憂在竅為舌中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在臟為脾其性靜兼其德為濡其用為化其色為黃其化為盈其蟲倮其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘陰陽應象有在音為宮在聲為歌在變動為噦在竅為口西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在臟為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為徑其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛陰陽應象有在音為商在聲為哭在變動為咳在竅為鼻北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝其在天為寒在地為水在體為骨在氣為堅在臟為腎其性為凜其德為寒其用為闕其色為黑其化為肅其蟲鱗其政為靜其令本闕其變凝冽其眚冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸陰陽應象有在音為羽在聲為呻在變動為栗在竅為耳又按以例推之中央熱傷皮毛寒勝熱當作燥傷皮毛熱勝燥北方寒傷血燥勝寒當作寒傷骨濕勝寒蓋濕熱二氣相合熱勝燥是熱而濕也濕勝寒是濕而熱也此五節字字精切果能參透萬病機括無不貫徹上素問假令得肝脈其外證善潔面青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也滿閉即滿痹也舊以閉淋二字句誤假令得心脈其外證面赤口乾喜笑其內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也假令得脾脈其外證面黃善噫善思善味其內證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠墮嗜臥四肢不收有是者脾也無是者非也假令得肺脈其外證面白善嚏悲愁不樂欲哭其內證臍右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也假令得腎脈其外證面黑善恐缺其內證臍下有動氣按之牢若痛其病逆氣小腹急痛泄而下重足脛寒而逆有是者腎也無是者非也上難經附五邪病證心例出難經凡病從前來者為實邪從後來者為虛邪從所不勝來者為賊邪從所勝來者為微邪自病為正邪假令心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪假令心病何以知中風得之然其色當赤何以言之肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑肝為心邪故知當赤色也其病身熱脅下滿痛其脈浮大而弦何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入脾為香臭入肝為臊臭入腎為腐臭入肺為腥臭故知心病傷暑得之當惡臭也其病身熱而煩心痛其脈浮大而散何以知飲食勞倦得之然當喜苦味也虛為不欲食實為欲食何以言之脾主味入肝為酸入心為苦入肺為辛入腎為咸自入為甘故知脾邪入心當喜苦味也其病身熱而體重嗜臥四肢不收其脈浮大而緩喜苦味非心喜之謂口中常患苦也何以知傷寒得之然當譫言妄語何以言之肺主聲入肝為呼入心為言入腎為呻入肺為哭故知肺邪入心為譫言妄語也其病身熱灑灑惡寒甚則喘咳其脈浮大而澀寒本腎邪此以為肺必兼燥也譫妄脈澀皆出於燥何以知中濕得之然當喜汗出不可止何以言之腎主液入肝為泣入心為汗入脾為涎入肺為涕自入為唾故知腎邪入心為汗不可止也其病身熱小腹痛足脛寒而逆其脈沉濡而大附六氣病證總例出素問風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫厥陰所至為裡急為支痛支柱妨也為緛戾為脅痛嘔泄所至謂主令也後同少陰所至為瘍疹身熱為驚惑惡寒戰栗譫妄為悲妄衄蔑為語笑太陰所至為積飲痞隔為驚惑蓄滿為中滿霍亂吐下為重胕腫重體重也如怠惰四肢不舉濕勝則緩故也少陽所至為嚏嘔為瘡瘍為驚躁瞀昧暴病即暴痛也為喉痹耳鳴嘔湧為暴注瞤瘛暴死陽明所至為浮虛為鼽尻陰股膝髀腨胻足病即痛字為皴揭為鼽嚏太陽所至為屈伸不利為腰痛為寢汗為流泄禁止尺膚滑澀肘臂掌臍寒熱決病篇出靈樞審其尺之緩急大小滑澀肉之堅脆而病形定矣視人之目窠上微癰一作擁雍如新臥起狀其頸脈動時咳按起手足上窅而不起者風水膚脹也水脹篇按其腹隨手而起如裹水之狀者水也窅而不起腹色不變者膚脹也腹筋起者臌脹也尺膚滑以淖澤者風也尺肉弱者解㑊尺脈緩澀謂之解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也面部闕中色以薄澤為風沖濁為痹尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者汗且出也人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹尺膚寒其脈小者泄少氣尺寒脈細謂之後泄尺膚炬然脈經作烜然下並同先熱後寒者寒熱也尺膚先寒久持之而熱者亦寒熱也寒熱瘧之類也尺澀脈滑謂之多汗滑者陰氣有餘為多汗而身寒脈粗尺常熱者謂之熱中脈粗大者陰不足陽有餘為熱中也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱難經以掌中熱而啘為心病掌中寒者腹中寒尺炬然熱人迎大者當奪血人迎指喉脈言謂此象將必奪血也當作嘗非尺堅大脈小甚少氣色白悗有加立死胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒當作熱胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹百病頭身手足寒熱順逆死生篇寒氣暴上因寒而氣上暴喘也脈滿而實何如曰實而滑則生實而逆則死脈實滿手足寒頭熱何如曰春秋則生冬夏則死脈浮而澀澀而身有熱者死其形盡滿身面俱腫何如曰其形盡滿者脈急大堅尺澀而不應也如是者從則生逆則死所謂從者手足溫也所謂逆者手足寒也上喘滿胕腫腸澼便血何如曰身熱則死寒則生脈懸絶此專指懸絶小也不言小者對下文滑大而可知也則死滑大則生腸澼下白沫何如曰脈沉則生浮則死腸澼身不熱脈不懸絶何如曰脈滑大者生懸澀者死以臟期之泄及便膿血諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽俱有餘則無汗而寒此發明滑澀寒熱之義也腎脈小搏沉為腸澼下血血溫身熱者死素問下利脈大者為未止脈微弱數者為欲自止雖發熱不死少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯脈還手足溫者生不者死下利惡寒而蜷臥手足溫者可治逆冷者死身熱有不死者其熱在初起為外感在日久為胃中濕熱非陰虛血竭孤陽飛越之躁熱上腸澼下利仲景脈至如搏血衄身熱者死脈來懸鉤浮為常脈素問吐血咳逆上氣其脈數而有一作身熱不得臥者死此虛勞敗候自古無治法矣上衄血吐血仲景乳子中風熱喘鳴肩息者脈實大也緩則生急則死乳子而病熱脈懸小者手足溫則生寒則死上乳子病風熱與常人不同者乳子則陰血必虛而陽氣亦大耗也陰在內陽之守也陽在外陰之使也陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩悗腹滿死能冬不能夏陰勝則生寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬上虛勞之偏陽偏陰者俱以腹滿為死者上損下損過脾皆不治也素問內傷傷於七情陰血虛耗及勞役飲食飢飽不節者病則手心熱手背不熱掌中熱而啘為心病外傷風寒者病則手背熱盛過於手心也上東垣內外傷辨手凡病初起手足俱冷為陰寒手足常畏冷為陽虛若足冷手不冷身體發熱頭或痛或不痛者有夾陰有內傷陽虛亦有濕溫病足冷手溫多汗妄言此痰氣結於中焦陽氣不得下通也若手冷而足熱如火者此陰衰於下陽衰於上三焦痞隔之象也亦有因脾胃濕熱鬱盛而肺虛濁氣下流者當有軟弱之候若加感寒濕當見赤腫即腳氣是也石頑形氣有餘不足篇寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形先腫而後痛者形傷氣也素問病在陽者命曰風在陰者命曰痹陰陽俱病命曰風痹病有形而不痛者陽之類也無形而痛者陰之類也陰痹者按之不可得無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久靈樞形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生平人氣勝形者壽病而形肉脫氣勝形者死形勝氣者危目眶內陷者死皮膚著入聲枯也者死脫肉身不去者死形肉已脫九候雖調猶死若夫急虛身中譬如墮溺不可為期其形肉雖不脫猶死也病而氣勝形者喘息低昂抬肩撼胸形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生氣盛身寒惡寒得之傷寒氣虛身熱惡熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入也素問形氣不足病氣有餘是邪勝也急當瀉之形氣有餘病氣不足急當補之形氣不足病氣不足此陰陽俱不足也不可刺之刺之重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者滅絶壯者不復矣形氣有餘病氣有餘此陰陽俱有餘也急瀉其邪調其虛實李東垣曰病來潮作之時病氣精神增添者是為病氣有餘乃邪氣勝也急瀉之病來潮作之時神氣困弱者為病氣不足乃真氣不足也急補之不問形氣有餘不足只從病氣上分別補瀉形謂皮肉筋骨血脈也氣謂口鼻氣息也東垣釋內經出內外傷辨附營衛病形榮之生病也寒熱少氣血上下行衛之生病也氣通當是沖痛時來時去怫愾賁響風寒客於腸胃之外寒痹之為病也留而不去時痛而皮不仁寒痹有椒薑桂心醇酒尉法榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死衛虛不用故治偏廢重用耆防諸病以肥瘦決難治易治篇脈一來而久住者宿病在心主中治脈二來而久住者病在肝支中治脈三來而久住者病在脾下中治脈四來而久住者病在腎間中治脈五來而久住者病在肺支中治五脈病虛羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也脈經曹山跗病肺消疸加寒熱不治所以然者其人尸奪尸奪者形弊形弊者不當關灸鑱石及飲毒藥也齊丞相舍人奴傷脾法當至春死乃至四月泄血死者診其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也原文一愈順及一時又安穀者過期不安穀者不及期上倉公傳續名醫類案載白雲集萬鎡家貧右臂痿廢一旦遇人謂之曰汝少饒今澀怒盛於肝火起於臟也因捫右臂曰幸尚瘦可治也武夷茶澗水飲之久自愈合前諸論案若不相合者蓋嘗思之肢臂痿廢者正氣不至其處則喜其瘦為邪氣亦所不居充其正氣而可復也虛損發於五臟見於周身則喜其肥為津液尚未銷盡扶其正氣而可復也然肥瘦亦須不失常度若瘦如枯柴肥如腐尸豈可為哉凡患腳氣諸風其人本黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白不耐風濕也瘦人肉硬肥人肉軟肉軟則受疾至深矣千金方此論其人之本肥本瘦也故與上文因病變肥變瘦者不同肥人肉淖理疏邪氣易於深入而痰多氣滯又難於出故難治也凡癰疽痿痹者俱當依此例診之肥人多中風以形厚氣虛難以周流氣滯痰生痰積生火故暴厥也瘦人陰虛血液衰少相火易亢故多勞嗽張石頑嘗謂有人年盛體豐冬時腰痛不能轉側怯然少氣足膝常冷與腎氣丸不應反轉寒熱喘滿者肥人多濕脈沉者濕遏氣脈也腰痛不能轉側者濕傷經絡也怯然少氣者濕干肺胃氣不舒也足膝常冷者陽氣不能四達也法當散氣行血以助流動而反與滋膩養榮宜其增劇也骨槁肉陷篇大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見豫之期日肺絶大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日心絶大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十日原作月非之內死脾絶大骨枯槁大肉陷下肩髓內消動作益衰真臟未見期一歲見其真臟乃豫之期日腎絶肩髓之肩疑是骨字之訛大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項肩項上似當有引字身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死肝絶急虛身中卒至五臟閉絶脈道不通氣不往來譬於墮溺不可為期其脈絶不來若一息五六至其形肉雖不脫真臟雖不見猶死也急有虛邪而身中之猝令五臟氣閉如墮溺不可期也脈法再動一至故一息五六至者十動以上也林億以為誤文疏矣上素問附損至脈證一呼三至至一呼六至者此一動一至之例也此至之脈也一呼一至至四呼一至者此損之脈也至脈從下上損脈從上下上下即內外也吳師朗謂虛損有外感內傷兩大端即此義一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至之為病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死靈樞本臟篇敘五臟內傷均以毛悴色夭為死證即此義損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精難經診大肉消長捷法篇病人大肉已落為不可救藥蓋以周身肌肉瘦削殆盡也余每以兩手大指次指後驗大肉之落與不落以斷病之生死百不失一病人雖骨瘦如柴驗其大指次指之後有肉隆起者病縱重可醫若他處肌肉尚豐驗其大指次指之後無肉隆起而反見平陷者病即不治矣周慎齊三書云久病形瘦若長肌肉須從內眥眼下胞長起以此屬陽明胃胃主肌肉故也此言久瘦漸復之機也不可不知趙晴初目眶為足陽明所繫極與大肉相關惟下利專泄胃氣其目眶雖陷而面色神光未改者不足為慮若壯年無病目眶忽陷久而不復咳嗽帶紅而目眶常陷諸病飲食倍增身面加肥而目眶獨陷皆脾真暗敗之先徵即面色神光未改且覺難於挽回補救及時方藥針對僅可僥幸百一若加見山根黯慘兩角無光短期速矣再瘦人與高年目眶雖陷而無慮者蓋陷之形有不同也胞皮寬縱眶骨不至削如鋒刃者是乃常見之事若胞皮吸入骨里凹成深坑得不謂之非常之變乎病深而形色毛髮有不變者篇營氣霈然者病在血脈是邪氣激其血脈光澤浮越於外也邪氣者濕熱也五色精微象見矣其壽不久也是五臟精華全越於外也前為邪盛此為真漓故曰色明不粗沉夭者為病甚嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣流連病有所並不在臟腑不變軀形身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於榮也脫營失精精氣外浮其內愈竭而毛髮面色愈美此為病在心心華在面精氣並於心故也所謂並者虛而相併也故凡坐傷於憂愁思慮者即肌肉消瘦肢節痠軟而毛髮面色自美也凡男女愛慕功名抑鬱者多有此候故脈經曰憂恚思慮心氣內索面色反好急求棺槨上素問女子豎病傷脾在死法中而視其顏色不變不以為意至春果嘔血死其病得之流汗流汗者同法病內重毛髮面色澤脈不衰此關內之病也流汗者自汗也內關之病不自知其所痛心慧然若無苦若見一病即不及救寒薄吾蟯瘕腹大上膚黃粗循之戚戚音瑟然飲以芫花一撮出蟯可數升病已三十日如故病得之於寒濕寒濕氣菀篤不發化為蟲矣所以知然者切其脈循其尺其尺索刺粗而毛髮奉美奉即菶字茂也原注當作秦非是蟲氣也其色澤者中臟無邪氣及重病也前案病內重而毛髮色澤此臟無重病而亦然者何也讀者宜深思其故上倉公傳面色不變肌膚日瘦外如無病內實虛虧俗名桃花疰其證必蒸熱咳嗽或多汗或無汗或多痰或無痰或經閉或泄精或吐血或衄血或善食或泄瀉此為陰火煎熬之證男女婚嫁過時及少寡者多有之以陰火既乘陽位消爍陽分之津液而陰分津液亦隨氣而升竭力以上供其消爍故肢體日削而面色愈加鮮澤也按陰陽津液之說未瑩面色屬心心華於面心神外馳不能內守是外有所慕精神馳騖故心之精華全浮於面與憂菀於內者迥別倉公前案流汗汗為心液亦與心精外越之義符合後案蟲氣是正氣未傷而濕熱內盛化生蟯蟲胃中轉多一番生氣故上蒸頭面而毛髮奉美也若至蟲能飲血齧腸則亦必漸變枯索矣傳尸疰者是惡蟲齧人臟腑其人沉沉默默不知所苦而無處不苦經年纍月漸就羸瘦其證蒸熱咳嗽不止腰背痠痛兩目不明四肢無力或面色脫白或兩頰時紅常懷忿怒夜夢奇怪或與鬼交最易傳染甚至滅門此面時紅陽浮無根也非蟲氣矣上張石頑醫通百病虛實順逆篇邪氣盛則實精氣奪則虛五實死五虛死脈盛皮熱腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛其時有生者何也曰漿粥入胃泄注止則虛者活身汗得後利則實者活何以得粥入泄止何以得汗與利是必有望於醫者氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛血並於陰氣並於陽故為驚狂陰不勝其陽脈流薄疾並乃狂三陽積並發為驚狂邪入於陽重陽則狂諸文皆指陽氣噴激也血並於陽氣並於陰乃為炅中炅即炯字熱也此陽氣內郁也血並於上氣並於下心煩惋善怒此陽氣下抑也血並於下氣並於上亂而善忘此孤陽亢逆陰津不能上濡也血氣並走於上則為大厥厥則暴死氣復返則生不返則死矣血氣者喜溫而惡寒寒則泣不能流溫則消而去之宜用溫散溫下不可溫補是故氣之所併為血虛血之所併為氣虛何者有者為實無者為虛故氣並則無血血並則無氣血與氣相失故為虛焉絡之與孫脈俱輸於經血與氣並故為實焉夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人上虛實以上素問喜怒不測飲食不節陰氣不足陽氣有餘營氣不行所謂氣行血止也陰津不足以載血使之滑利而陽氣之悍者湧來血遂擁擠而成癰疽發為癰疽陰陽不通兩熱相搏是血愈擁擠而悍氣亦不得通故蒸而為膿矣乃化為膿膿成十死一生其白眼青黑眼小一逆也納藥而嘔二逆也腹痛渴甚三逆也肩項中不便四逆也音嘶色脫五逆也除此五者為順也今瘍科有五善七惡之說義即本此上癰疽順逆熱病脈靜汗已出脈躁盛是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是四逆也淫馬注謂好色非也凡遺精漏濁下利自盜汗皆是寒熱奪形脈堅搏是五逆也腹脹身熱脈大一逆也腹鳴而滿四肢清泄脈大二逆也衄而不止脈大三逆也咳且溲血脫形其脈小徑四逆也咳脫形身熱脈小以疾五逆也如是者不過十五日而死矣腹大脹四末清脫形泄甚一逆也腹脹便血脈大時絶二逆也咳溲血形肉脫脈搏三逆也嘔血胸滿引背脈小而疾四逆也咳嘔腹脹且飧泄其脈絶五逆也如是者不及一時而死矣上雜病順逆熱病不可刺者有九所謂勿刺者有死徵也一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也其可刺者急刺之不汗且泄上熱病順逆以上靈樞諸病以晝夜靜劇辨陰陽氣血篇出丹溪晝則增劇夜則安靜是陽病有餘氣病而血不病也夜則增劇晝則安靜是陰病有餘血病而氣不病也晝則發熱夜則安靜是陽氣自盛於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰也補陰瀉陽夜則惡寒晝則安靜是陰氣自盛於陰分也夜則安靜晝則惡寒是陰氣上冒於陽中也夜則惡寒晝亦惡寒是重陰無陽也補陽瀉陰晝則惡寒夜則煩躁飲食不入名曰陰陽交錯者死按晝夜靜劇仍須辨證之寒熱有餘不足即如晝靜夜劇其證見陽熱之有餘者是陽陷入陰也其證見陰寒之不足者是陰氣自盛也其證見虛熱而不甚者則為陰虛而非陽盛矣其證見微寒而不甚者又為陽虛而非陰盛矣余依此例推之更有寒熱日夜數過寒已即熱熱已復寒無已時者在初病為風氣太盛所謂風勝則動也在汗後為里邪外爭在下後為外邪內爭皆為陰陽不和而有病進病退之別也在久病為陰陽敗亂元氣無主也百病善惡形證匯述篇五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣難經髓會絶骨義即本此作枕骨非得強則生失強則死五強精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛難經脫陽者見鬼脫陰者目盲五脫是以夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也五喘故飲食飽甚汗出於胃疾走恐懼汗出於肝驚而奪精汗出於心持重遠行汗出於腎搖體勞苦汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也五汗面腫曰風足脛腫曰水頸脈動喘疾咳曰水目裹微腫如臥蠶起之狀曰水溺黃赤安臥者黃疸已食如飢者胃疸風水疸上內經病欲得寒而欲見人者病在腑也病欲得溫而不欲見人者病在臟也何以言之腑者陽也陽病欲得寒又欲見人臟者陰也陰病欲得溫又欲閉戶獨處惡聞人聲故以別知臟腑之病也陽入之陰則靜陰出之陽則怒此病機也難經病六七日病謂臥病不動不知人也手足三部脈皆至大煩而口噤不能言其人躁擾者必欲解也若脈和其人大煩目重瞼內際黃者此謂欲解也脈皆至者其先脈伏也脈和者本未伏也病人家來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈不和處言已愈師持脈病人缺者無病也脈之呻者病當是痛字也言遲者風也搖頭言者里痛也行遲者表強也坐而伏者短氣也坐而下一腳脈經作膝者腰痛也裡實護腹如懷卵物者心痛也諸脈浮數其人當發熱而反時時灑淅惡寒若身中或腹內有痛處飲食如常者必蓄積有膿也在身者為諸癰疽在內者為肺癰腸胃諸癰也浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死腫脹由四肢向腹者死由腹向四肢者可治又凡面色起於耳目口鼻之竅而外行者病可治由外部而入竅者病即死矣仲景凡不病而五行絶者死五行即五官也絶如目眶陷眉系傾唇反人中滿是不病而性變者死不病而暴語妄者死不病而暴不語者死不病而暴喘促者死不病而暴強厥者死不病而暴目盲者死不病而暴耳聾者死不病而暴緩痿者死不病而暴腫滿者死不病而暴大小便結者死不病而暴昏冒如醉者死此皆內氣先盡故也逆者即死順者二年無有生者也凡辨生死之法聲色心性但一改常即死矣又有無病而暴面色慘黯無病而暴肌肉瘦削皆凶中藏經凡察病者身以輕易轉側而熱者為陽病在氣分若肢體骨節疼痛為表證以沉重難移動而寒者為陰病入血分若腹痛自利厥逆宜溫經然中濕亦主身重痛濕痹則身痛關節不利風濕則身痛而腫骨節煩疼掣痛不得屈伸汗出惡風而不欲去衣若少腹硬痛小便不利為溺澀小便利為蓄血未發熱而厥者寒也發熱久而後厥者熱深也背微惡寒者陽微也自汗身重鼻鼾多睡風溫也肉瞤筋惕汗下虛也手足瘛瘲虛而有風也循衣撮空有陽明實證又有似撮空而執持堅急者亦屬內熱非盡絶證石頑附李東垣內外傷辨證外感八風之邪乃有餘證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在溫暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似細分之特異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至傳入里作下證乃罷語聲重濁高厲有力鼻息壅塞而不通能食腹中和口知味大小便如常筋骨疼痛不能搖動便著床枕非扶不起其內傷與飲食不節勞役所傷然亦惡風居露地中遇大漫風起卻不惡也惟門窗隙中些小賊風來必大惡也與傷風傷寒俱不同矣況鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不欲食三者互有之腹中不和或腹中急而不能伸口不知五穀之味小便頻數而不渴初勞役得病食少小便赤黃大便常難或澀或結或虛坐只見些小白膿時有下氣或泄黃如糜或溏泄色白或結而不通若心下痞或胸中閉塞如刀劙之痛二者亦互作不並出也有時胃脘當心而痛上支兩脅痛必臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四肢不收無氣以動而懶倦嗜臥以其外感風寒俱無此證故易為分辨耳總論內傷及勞役飲食不節病手心熱手背不熱外傷風寒則手背熱手心不熱辨手心手背若飲食勞役所傷其外證必顯在口必口失穀味必腹中不和必不欲言縱勉強對答聲必怯弱口沃沫多唾鼻中清涕或有或無即陰證也外傷風寒則其外證必顯在鼻鼻氣不利聲重濁不清利其言壅塞盛有力而口中必和傷寒則面赤鼻壅塞而干傷風則流清涕而已內經云鼻者肺之候肺氣通於天外傷風寒則鼻為之不利口者坤土也脾氣通於口飲食失節勞役所傷口不知穀味亦不知五味又云傷食惡食傷食明矣辨口鼻外傷風寒者故其氣壅盛而有餘內傷飲食勞役者其口鼻中皆氣短促不足以息何以分之蓋外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利面赤不通其鼻中氣不能出並從口出但發一言必前輕而後重其言高其聲壯厲而有力是傷寒則鼻乾無涕面壅色赤其言前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從甕中出亦前輕而後重高揭而有力皆氣盛有餘之驗也內傷飲食勞役者心肺之氣先損為熱所傷熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉強答之其氣亦怯其聲亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辨之豈有醫者反不能辨之乎辨氣少氣盛內證頭痛有時而作有時而止外證頭痛常常有之直須傳入裡實方罷此又內外證之不同者也辨頭痛內傷等病是心肺之氣已絶於外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外傷風寒是腎肝之氣已絶於內腎主骨為寒肝主筋為風自古腎肝之病同一治以其遞相維持者也故經言膽主筋膀胱主骨是也或中風或傷寒得病之日便著床枕非扶不起筋骨為之痠痛不能動搖乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也辨筋骨四肢仲景傷寒論云中風能食傷寒不能食二者皆口中和而不惡食若勞役所傷及飲食失節寒溫不適三者俱惡食口不知五味亦不知五穀之味只此一辨足以分內外有餘不足二證也傷寒證雖不能食而不惡食口中和知五味亦知穀味蓋無內證則心氣和脾氣通知五穀之味矣辨外傷不惡食若勞役飲食失節寒溫不適此三者皆惡食外感風寒之邪三日已外谷消水去邪氣傳裡始有渴也內傷飲食失節勞役久病者必不渴是邪氣在血脈中有餘故也初勞役形質飲食失節傷之重者必有渴以其心火熾上克於肺金故渴也又當以此辨之雖渴欲飲冷水者當徐徐少與之不可縱意而飲恐水多峻下則胃氣愈弱輕則為脹重則傳變諸證必反復悶亂百脈不安夜加增劇不得安臥不可不預度也辨渴與不渴或因勞役動作腎間陰火沸騰事閒之際或於陰涼處解脫衣裳更有新沐浴於背陰處坐臥其陰火下行還歸腎間皮膚腠理極虛無陽但風來為寒涼所遏表虛不任其風寒自認外感風寒求醫解表以重絶元氣取禍如反掌苟幸而免者亦致虛勞氣血皆弱不能完復且表虛之人為風寒所遏亦是虛邪犯表始病一二日之間特與外中賊邪有餘之證頗相似處故致疑惑請醫者只於氣少氣盛上辨之其外傷賊邪必語聲前輕後重高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促上氣高喘懶語其聲困弱而無力至易見也若毫釐之誤則千里之謬也辨勞役受病表虛不可作表實治之復有一節乘天氣大熱之時在於路途中勞役得之或在田野間勞形得之或更有身體薄弱食少勞役過甚又有修善常齊之人胃氣久虛而因勞役得之者皆與陽明中熱白虎湯證相似必肌體捫摸之壯熱必躁熱悶亂大惡熱渴而飲水以勞役過甚之故亦身疼痛始受病之時特與中熱外得有餘之證相似若誤與白虎湯旬日必死此證脾胃大虛元氣不足口鼻中氣皆短促而上喘至日轉以後是陽明得時之際病必少減若是外中熱之病必到日晡之際大作譫語其熱增加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解若有難決疑似之證必當待一二日求醫療治必不至錯誤矣辨證與中熱頗相似五臟陰陽絶證篇脈浮而洪一作滑身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也又未知何臟先受其災如汗出發潤喘不休者此為肺先絶也陽反獨留形體如煙燻直視搖頭者此為心絶也唇吻反青四肢漐習者此為肝絶也環口黧黑柔汗發黃者此為脾絶也溲便遺失狂言目反直視者此為腎絶也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者利不禁下甚者手足不仁仲景五臟氣絶於內者脈口氣內絶不至其死也內氣重竭無氣以動故靜五臟氣絶於外者脈口氣外絶不至其死也陽氣反入陰氣有餘陽並於陰故躁靈樞肝絶八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止又面腫蒼黑肝敗膽絶七日死何以知之眉為之傾筋絶九日死何以知之手足爪甲青呼罵不休心絶一日死何以知之肩息目亭亭回視又手掌並缺盆骨滿心敗小腸絶六日死何以知之髮直如干麻不得伸屈自汗不止脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度又臍腫滿突出脾敗胃絶五日死何以知之脊痛腰中重不可反側腓腸平中藏經此文云骨絶據諸證屬腎當是骨肉絶六日死何以知之耳干舌腫溺血大便赤泄肺絶三日死何以知之口張氣但出而不還又鼻黑唇腫肺敗大腸絶不治何以知之泄利無度利絶則死腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰欲折自汗出如流水足心腫又陰陽腫不起腎敗骨絶十日死何以知之齒黃落色如熟小豆或齒忽變黑或齒光無垢以上脈經參中藏經形診絡脈形色類絡解篇經脈十二者伏行分肉之間深而不見其常見者足太陰過於外當是內字踝之上無所隱故也諸脈之浮而常見者皆絡脈也故經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也諸絡脈者皆不能經大節之間必行絶道而出入復合於皮中其會皆見於外陽明之陽名曰害蜚上下同法上下手足經也視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然陽注於陰陰滿之外太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡此十二經之絡脈者皆皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也泝然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗上皮部論按絡有二說一經脈之分支者以其能從此經絡於彼經也在三陽之部曰陽絡三陰之部曰陰絡一臟腑之膜與系也膜能包絡臟腑之體系能連絡臟腑於身此皆謂之陰絡素問脈代而鉤者病在絡脈倉公代者絡脈有過皆以臟腑之系言之繫有病則臟腑之氣不能暢達於身而脈來不一矣至於經脈之分絡行於身者雖有部位而人不盡同故曰絡脈者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也凡以絡脈求穴者須知此義絡形篇素問繆刺論敘絡脈病證甚詳集隘不能備録何謂虛實曰邪氣盛則實精氣奪則虛經絡俱實何如曰是寸脈急而尺緩也皆當治之寸口候經所謂經不可見其虛實以氣口知之也尺膚候絡所謂皮之部也脈實則滿而急絡實則膹起而緩滑則從澀則逆也夫虛實者皆從其物類始故五臟骨肉滑利可以久長也言虛實無定形因物類以為推如其物本澀者即以得其澀為實失其澀為虛矣人之五臟骨肉本滑利故不失其滑利者可以久長也絡氣不足經氣有餘何如曰脈口熱而尺寒也秋冬為逆春夏為從治主病者經虛絡滿何如曰經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生治此者絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽絡陽經陰刺瀉灸補色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也色脈形肉不得相失故知一則為工知二則為神知三則神且明調其脈之緩急大小滑澀而病變定矣脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦膹而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒是故刺急者深內而久留之刺緩者淺內而疾髮針以去其熱刺大者微瀉其氣無出其血刺滑者疾髮針而淺內之以瀉其陽氣而去其熱刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針即按其痏無令血出以和其脈諸小者陰陽形氣俱不足勿取以針而調以甘藥也澀脈多血後人多疑之其實經意指氣虛血壅以病形言如形瘦脈大胸中多氣者死豈真多氣而反死哉正以其氣滿而喘息不便耳奇邪之不在經者血絡是也是故刺血絡而僕者脈氣盛而血虛刺之則脫氣脫氣則僕氣悍而血少不能維之刺之則見開而出氣脫而僕矣凡浮大而散之脈重用汗劑則汗出不可止而亡陽亦此意也經脈曰其脈青而短少氣甚者瀉之則悶悶甚則僕不得言義理正可互參血出而射者血氣俱盛而陰氣少其血滑刺之則射血少黑而濁者陽氣蓄積久留而不瀉其血黑以濁故不能射矣血出清而半為汁者新飲而液滲於絡而未合和於血也故血出而汁別焉其不新飲者身中有水久則為腫血必得水調之始能滑淖故經謂水入於經其血乃成新飲而未合和故汁別也髮針而腫者陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫按病有浮沉刺有淺深若刺淺不及病反生外壅而為腫矣血出若多若少而面色蒼蒼者陰陽之氣其新相得而未和合因而瀉之陰陽俱脫表裡相離故脫色而蒼蒼然血出若多若少言不必皆因多出血而然刺之血出多面色不變而煩悗者刺絡而虛經虛經之屬於陰者陰脫故煩悗虛經之屬於陰者謂虛其陰經也此刺失於深也多出血而不動搖者何也陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血弗能虛也不動搖言形色神氣俱無所變動也何以知其有餘也曰血脈者盛堅橫以赤上下無常處小者如針大者如箸則而瀉之萬全也馬氏曰則當是側字愚按則因也故無失數矣針入而肉著者熱氣因於針則針熱熱則肉著於針故堅矣血絡篇因聚結之義也是故視其經脈之在於身也其見浮而堅其見明而大者多血其見細而沉者多氣也骨度篇多氣即少血也經每有此文法諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也經脈篇凡人著黃五種黃皆同其人至困冥漠不知東西者看其左手脈名手肝脈兩筋中其脈如有如無又看近手屈肘前臂當有三歧脈中央者名手肝脈兩廂者名歧脈若肝脈全無兩廂壞者其人十死若中央脈近掌三指道有如不絶必不死脈經三日漸徹至手掌必得汗而愈婦人看右手脈也巢氏有如不絶謂有而又不散斷也經言脈之大小長短厚薄緩急結直內應小腸即賅絡脈言之已見前身形內應臟腑篇不復贅録絡色篇絡脈之見也其五色各異何也曰經有常色而絡無常變也經之常色何如曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也絡之陰陽亦應其經乎曰陰絡之色應其經陽絡之色變無常隨四時而行寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色俱見者謂之寒熱應其經脈之色謂五臟應之也此皆常色謂本是常色多則為病也邪之入於絡也則絡脈盛色變其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也論疾診尺曰診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者為寒熱蓋寒痼於外熱沸於內也黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣論疾診尺曰魚上白肉有青血脈者胃中有寒胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆取血絡必間日而一取之血盡乃止乃調其虛實有因蓄血而生寒熱有因寒熱而致蓄血故有虛實不同其青而短少氣甚者瀉之則悶悶甚則僕不得言悶則急坐之也急坐勿使其僕面熱者足陽明病魚絡血者手陽明病兩跗之上脈堅陷者足陽明病此胃脈也經脈邪在肝者取耳中青脈以去其掣論疾診尺曰嬰兒病耳間有青筋者掣痛據此是不僅嬰兒有之五邪臂多青脈曰脫血脈要精微絡色之變皆由血生青黑皆血寒而瘀而有淺深之辨黃赤皆血熱而沸而有燥濕之殊白者血少之甚也黃兼赤者為濕熱兼白兼青者為濕寒青黑兼赤者為寒熱相搏赤多為紫是熱極而血湧聚於此又有毒也純青純黑推之不動血已死也神昏不知人血脈通於心若絡色或赤或黑而腹內作痛神氣清明者此病在小腸及脈絡中也若狂躁者血熱攻及心包也若昏迷不省者血寒而瘀甚矣全不知人即死
