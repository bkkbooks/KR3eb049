front:
  text: 序四診以望居首以切居末者醫師臨診之次第非法之有輕重緩急也前人每謂切脈為末三診為本及其著書立說又詳於脈而略於三者明李言聞著四診發明無傳本欲求四診之全書戛戛乎其不可得學海初嘗致力脈法臨診略能測人血氣之寒熱虛實矣四診未全尚多隔閡夫望聞問有在切之先者必待切以決其真也有在切之後者指下之疑又待此以決其真也三法之與切脈固互為主輔矣三法之中又望為主而聞問為輔古人洞見五臟癥結即操此術也內經言之至精且詳難經中藏經脈經千金方翼方所述扁鵲華他諸法亦皆明切適用自是以後立說者不過約撮大概詮釋古義且不能全是編也內經三診之文全在難經以下擇其切要能補內經未備者收之至於傷寒溫病之舌法陶節庵葉天士兩家為最著以其所言皆其所親見而施驗也杜青碧之金鏡録三十六法張誕先之舌鑑一百二十法各有專書無煩摘録焉署曰形色外診簡摩以望為三診之本故特詳也聞問事少附見末篇將以質世之知者甲午仲冬澄之
